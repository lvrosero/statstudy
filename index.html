function buildStudyPlan(topics, examDate, hoursPerDay) {
  var today      = todayISO();
  var daysToExam = Math.max(daysUntil(examDate), 1);
  var minPerDay  = hoursPerDay * 60;
  var MIN_STUDY  = 45;
  var MIN_REVIEW = 20;

  // How many topics can be studied per day
  var studyDays    = Math.max(daysToExam - 1, 1);
  var topicsPerDay = Math.max(1, Math.floor(minPerDay / MIN_STUDY));

  var plan       = [];
  var topicQueue = topics.slice();
  var dayOffset  = 0;
  var studied    = [];

  // ── Phase 1: Study sessions ──────────────────────────────────────
  while (topicQueue.length > 0 && dayOffset < studyDays) {
    var dayDate  = addDays(today, dayOffset);
    var dayItems = [];
    var slots    = topicsPerDay;

    while (slots > 0 && topicQueue.length > 0) {
      dayItems.push(topicQueue.shift());
      slots--;
    }

    var usedMin = dayItems.length * MIN_STUDY;
    var leftMin = minPerDay - usedMin;

    // One entry per topic this day
    dayItems.forEach(function(t) {
      plan.push({ date: dayDate, label: t, type: 'estudio', topic: t });
      studied.push({ text: t, dayOffset: dayOffset });
    });

    // Spaced repetition mini-review if time left (topics studied 3+ days ago)
    if (leftMin >= MIN_REVIEW) {
      var toReview = studied.filter(function(s){ return s.dayOffset <= dayOffset - 3; });
      if (toReview.length > 0) {
        var reviewLabels = toReview.slice(0, 3).map(function(s){ return s.text; });
        var shortLabel   = reviewLabels.slice(0, 2).join(', ') + (reviewLabels.length > 2 ? '…' : '');
        plan.push({ date: dayDate, label: 'Repaso: ' + shortLabel, type: 'repaso' });
      }
    }

    dayOffset++;
  }

  // ── Phase 2: Review days (within remaining days before exam) ─────
  var remaining = daysToExam - dayOffset;

  if (remaining >= 3) {
    var midDay = dayOffset + Math.floor(remaining / 2);
    if (midDay < daysToExam - 1) {
      plan.push({ date: addDays(today, midDay), label: '📖 Repaso general — todos los temas', type: 'repaso' });
    }
    plan.push({ date: addDays(examDate, -1), label: '🧘 Repaso ligero + descanso mental', type: 'repaso' });
  } else if (remaining === 2) {
    plan.push({ date: addDays(examDate, -1), label: '📖 Repaso final — puntos clave', type: 'repaso' });
  } else if (remaining === 1) {
    plan.push({ date: addDays(examDate, -1), label: '🧘 Repaso ligero — descansa bien', type: 'repaso' });
  }

  // Sort by date
  plan.sort(function(a, b){ return a.date < b.date ? -1 : a.date > b.date ? 1 : 0; });
  return plan;
}

function deletePlan(id) {
  if (!confirm('¿Eliminar este plan de estudio?')) return;
  examPlans = examPlans.filter(function(p){ return p.id !== id; });
  saveAll();
  toast('🗑 Plan eliminado');
  renderPlanificador();
}

function buildSessTopicView() {
  var m = getMateria(sess.materiaId);
  var topicText = sess.topicKey ? sess.topicKey.replace(sess.materiaId + '::', '') : '';
  var subtopics = data[sess.materiaId].topics.filter(function(t){
    return t.text === topicText || (sess.topicKey && t.text === topicText);
  });
  var syl = SYLLABUS[sess.materiaId] || [];
  var unit = null;
  syl.forEach(function(u) { if (u.topics.includes(topicText)) unit = u; });
  var siblings = unit ? unit.topics : [];

  return '<div style="padding:12px;background:var(--sky);border-radius:var(--r-md);margin-bottom:12px;">' +
    '<div class="t-label" style="margin-bottom:4px;">' + (m?m.icon+' '+m.name:'') + '</div>' +
    '<div style="font-weight:700;font-size:.95rem;color:var(--navy);">' + topicText + '</div>' +
  '</div>' +
  (siblings.length > 1
    ? '<div style="margin-bottom:10px;"><div class="t-label" style="margin-bottom:6px;">Temas relacionados</div>' +
        siblings.filter(function(s){ return s!==topicText; }).slice(0,5).map(function(s) {
          var td = data[sess.materiaId].topics.find(function(t){ return t.text===s; });
          return '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;">' +
            '<input type="checkbox"' + (td&&td.done?' checked':'') + ' onchange="toggleTopic(\'' + sess.materiaId + '\',\'' + s.replace(/'/g,"\\'") + '\',this.checked)" style="accent-color:var(--sage);">' +
            '<span style="font-size:.83rem;' + (td&&td.done?'text-decoration:line-through;color:var(--text-light);':'') + '">' + s + '</span>' +
          '</div>';
        }).join('') +
      '</div>'
    : '') +
  '<button class="btn btn-ghost btn-sm" onclick="openSelectTema()">Cambiar tema</button>' +
  '<button class="btn btn-sm btn-secondary" style="margin-left:6px;" onclick="completeSession()">✅ Marcar completado</button>';
}

      '</select>' +

    '<div id="sess-topics-list" style="display:flex;flex-direction:column;gap:5px;max-height:300px;overflow-y:auto;">' +
      (sess.materiaId ? getSessTopicsList(sess.materiaId) : '') +
    '</div>';

function loadSessTopics() {
  var mid = document.getElementById('sess-materia-sel').value;
  document.getElementById('sess-topics-list').innerHTML = mid ? getSessTopicsList(mid) : '';
}


function getSessTopicsList(mid) {
  var syl = SYLLABUS[mid] || [];
  var items = [];
  syl.forEach(function(unit) {
    unit.topics.forEach(function(t) { items.push(t); });
  });
  data[mid].topics.forEach(function(ut) {
    if (!items.includes(ut.text)) items.push(ut.text);
  });
  return items.map(function(t) {
    return '<button onclick="setSessTopic(\'' + mid + '\',\'' + t.replace(/'/g,"\\'") + '\')" style="padding:9px 12px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--surface);text-align:left;font-size:.85rem;cursor:pointer;transition:background .15s;" onmouseover="this.style.background=\'var(--sky)\'" onmouseout="this.style.background=\'var(--surface)\'">' + t + '</button>';
  }).join('');
}


function setSessTopic(mid, text) {
  sess.materiaId = mid;
  sess.topicKey  = mid + '::' + text;
  closeModal('modal-tema');
  renderSesion();
}


function completeSession() {
  if (!sess.materiaId || !sess.topicKey) return;
  var topicText = sess.topicKey.replace(sess.materiaId + '::', '');
  toggleTopic(sess.materiaId, topicText, true);
  sessions.push({
    date: todayISO(), materiaId: sess.materiaId,
    topicText: topicText, minutes: pom.sessions * pom.workMin,
    pomodoros: pom.sessions, completed: true,
  });
  saveAll();
  updateStreak();

// POMODORO ENGINE
// ═══════════════════════════════════════════════════════════════

function pomDisplay() {
  var m = Math.floor(pom.seconds / 60).toString().padStart(2,'0');
  var s = (pom.seconds % 60).toString().padStart(2,'0');
  return m + ':' + s;
}

function updatePomDisplay() {
  var t = pomDisplay();
  var el1 = document.getElementById('pom-timer');
  var el2 = document.getElementById('dash-pom-display');
  if (el1) el1.textContent = t;
  if (el2) el2.textContent = t;
  document.title = (pom.running ? (pom.mode==='work'?'🎯 ':'☕ ') : '') + t + ' — StatStudy';
}

function pomToggle() {
  if (pom.running) {
    clearInterval(pom.timer); pom.running = false;
  } else {
    pom.running = true;
    pom.timer = setInterval(function() {
      pom.seconds--;
      if (pom.seconds <= 0) {
        clearInterval(pom.timer);
        pom.running = false;
        if (pom.mode === 'work') {
          pom.sessions++;
          pom.mode = 'break';
          pom.seconds = pom.breakMin * 60;
          playBeep();
          toast('☕ ¡Tiempo de descanso! ' + pom.breakMin + ' minutos', 4000);
        } else {
          pom.mode = 'work';
          pom.seconds = pom.workMin * 60;
          playBeep();
          toast('🎯 ¡A estudiar! Pomodoro #' + (pom.sessions+1), 4000);
        }
      }
      updatePomDisplay();
      updatePomUI();
    }, 1000);
  }
  updatePomUI();
}

function pomReset() {
  clearInterval(pom.timer);
  pom.running = false; pom.mode = 'work';
  pom.seconds = pom.workMin * 60;
  updatePomDisplay(); updatePomUI();
}

function updatePomUI() {
  var btn  = document.getElementById('pom-start-btn');
  var badge = document.getElementById('pom-mode-badge');
  var sl   = document.getElementById('pom-sessions-label');
  if (btn)   btn.textContent = pom.running ? '⏸ Pausar' : '▶ Iniciar';
  if (badge) badge.textContent = pom.mode === 'work' ? '🎯 Estudio' : '☕ Descanso';
  if (sl)    sl.textContent = '🍅 ' + pom.sessions + ' pomodoros completados';
}

function playBeep() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, .35, .7].forEach(function(delay, i) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = 520 + i*130;
      gain.gain.setValueAtTime(0, ctx.currentTime+delay);
      gain.gain.linearRampToValueAtTime(.45, ctx.currentTime+delay+.05);
      gain.gain.exponentialRampToValueAtTime(.001, ctx.currentTime+delay+.3);
      osc.start(ctx.currentTime+delay);
      osc.stop(ctx.currentTime+delay+.35);
    });
  } catch(e) {}
}

            var done = data[m.id].topics.filter(function(t){ return t.done; }).length;
            var tot  = data[m.id].topics.length;
            return '<div>' +
              '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">' +
                '<span style="font-size:.85rem;font-weight:500;">' + m.icon + ' ' + m.name + '</span>' +
                '<span style="font-size:.78rem;font-weight:700;color:var(--navy);">' + done + '/' + tot + ' · ' + prog + '%</span>' +
              '</div>' +
              '<div class="progress-track"><div class="progress-fill" style="width:' + prog + '%;"></div></div>' +
            '</div>';
          }).join('') +
      '</div>' +
    '</div>';
}


function playYouTube(videoId, label) {
  musicPlayer.trackId    = videoId;
  musicPlayer.trackLabel = label;
  musicPlayer.type       = 'YouTube';
  musicPlayer.active     = true;

  if (!window.YT || !window.YT.Player) {
    // API not yet loaded — load it once
    if (!window._ytApiLoading) {
      window._ytApiLoading = true;
      var tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(tag);
    }
    window.onYouTubeIframeAPIReady = function() {
      musicPlayer.ytReady = true;
      window._ytApiLoading = false;
      createYTPlayer(videoId);
    };
  } else if (!musicPlayer.ytPlayer) {
    createYTPlayer(videoId);
  } else {
    // Player exists — check iframe is still live in DOM before using it
    if (document.getElementById('yt-player-div')) {
      try {
        musicPlayer.ytPlayer.loadVideoById(videoId);
        musicPlayer.ytPlayer.playVideo();
      } catch(e) {
        musicPlayer.ytPlayer = null;
        createYTPlayer(videoId);
      }
    } else {
      // DOM was wiped (renderSesion called) — recreate from body container
      musicPlayer.ytPlayer = null;
      createYTPlayer(videoId);
    }
  }
  updateMusicBar(label, 'YouTube');
  updatePlaylistActiveState(videoId);
}


function createYTPlayer(videoId) {
  // If player already exists and its iframe is still in DOM — just load new video
  if (musicPlayer.ytPlayer && document.getElementById('yt-player-div')) {
    try {
      musicPlayer.ytPlayer.loadVideoById(videoId);
      musicPlayer.ytPlayer.playVideo();
      return;
    } catch(e) {
      // iframe was detached — fall through to recreate
      musicPlayer.ytPlayer = null;
    }
  }

  // Ensure the permanent container exists in body (created once at startup)
  var container = document.getElementById('yt-container');
  if (!container) {
    container = document.createElement('div');
    container.id = 'yt-container';
    container.style.cssText = 'position:fixed;width:1px;height:1px;overflow:hidden;opacity:0;pointer-events:none;left:-9999px;top:-9999px;';
    document.body.appendChild(container);
  }
  // Always recreate the inner div so YT has a fresh target
  container.innerHTML = '<div id="yt-player-div"></div>';
  musicPlayer.ytPlayer = null;

  musicPlayer.ytPlayer = new YT.Player('yt-player-div', {
    height: '1', width: '1',
    videoId: videoId,
    playerVars: { autoplay:1, controls:0, fs:0, modestbranding:1, rel:0 },
    events: {
      onReady: function(e) { e.target.playVideo(); },
      onStateChange: function(e) {
        if (e.data === YT.PlayerState.ENDED) {
          var idx = YOUTUBE_TRACKS.findIndex(function(t){ return t.id === musicPlayer.trackId; });
          var next = YOUTUBE_TRACKS[(idx+1) % YOUTUBE_TRACKS.length];
          playYouTube(next.id, next.label);
        }
      }
    }
  });
}


function musicTogglePlay() {
  if (!musicPlayer.ytPlayer) return;
  var state = musicPlayer.ytPlayer.getPlayerState();
  if (state === 1) { // playing
    musicPlayer.ytPlayer.pauseVideo();
    var btn = document.getElementById('music-play-btn');
    if (btn) btn.textContent = '▶';
  } else {
    musicPlayer.ytPlayer.playVideo();
    var btn = document.getElementById('music-play-btn');
    if (btn) btn.textContent = '⏸';
  }
}


function musicStop() {
  if (musicPlayer.ytPlayer) {
    try { musicPlayer.ytPlayer.stopVideo(); } catch(e) {}
  }
  musicPlayer.active     = false;
  musicPlayer.trackId    = null;
  musicPlayer.trackLabel = '';
  // Update bar in-place — never call renderSesion() which destroys the iframe
  var bar = document.getElementById('music-player-bar');

  YOUTUBE_TRACKS.forEach(function(t) {

}

function toEmbedUrl(url) {
  // YouTube: various formats → embed
  var ytMatch = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|playlist\?list=))([\w-]+)/);
  if (ytMatch) {
    var isPlaylist = url.indexOf('playlist') > -1 || url.indexOf('list=') > -1;
    if (isPlaylist) {
      var listMatch = url.match(/list=([\w-]+)/);
      return listMatch ? 'https://www.youtube.com/embed/videoseries?list=' + listMatch[1] + '&autoplay=1' : null;
    }
    return 'https://www.youtube.com/embed/' + ytMatch[1] + '?autoplay=1&rel=0';
  }
  // Spotify: track/playlist/album
  var spMatch = url.match(/open\.spotify\.com\/(track|playlist|album|artist)\/([\w]+)/);
  if (spMatch) {
    return 'https://open.spotify.com/embed/' + spMatch[1] + '/' + spMatch[2];
  }
  return null;
}


function openCustomLink(url, label) {
  var embedUrl = toEmbedUrl(url);
  if (!embedUrl) {
    window.open(url, '_blank');

  }
  var isSpotify = url.indexOf('spotify') > -1;
  var iframeH   = isSpotify ? '152' : '200';
  var safeLabel = (label||'Playlist').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  var safeUrl   = url.replace(/"/g,'&quot;');

  var panel = document.getElementById('custom-embed-panel');
  if (!panel) {
    panel = document.createElement('div');
    panel.id = 'custom-embed-panel';
    panel.style.cssText = 'margin-top:10px;border-radius:var(--r-md);overflow:hidden;background:var(--surface);border:1.5px solid var(--border);';
    var listEl = document.getElementById('custom-links-list');
    if (listEl && listEl.parentNode) listEl.parentNode.insertBefore(panel, listEl.nextSibling);
  }

  var header = document.createElement('div');
  header.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--sky);border-bottom:1px solid var(--sky-deep);';
  header.innerHTML =
    '<span style="font-size:.78rem;font-weight:600;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70%;">' + safeLabel + '</span>' +
    '<div style="display:flex;gap:6px;">' +
      '<a href="' + safeUrl + '" target="_blank" style="font-size:.68rem;color:var(--navy);text-decoration:none;padding:3px 8px;background:white;border-radius:99px;border:1px solid var(--sky-deep);">&#x2197; Abrir</a>' +
    '</div>';

  var closeBtn = document.createElement('button');
  closeBtn.textContent = '✕';
  closeBtn.style.cssText = 'background:none;border:none;cursor:pointer;font-size:.8rem;color:var(--text-light);padding:0 4px;';
  closeBtn.onclick = function() { panel.remove(); };
  header.querySelector('div').appendChild(closeBtn);

  var iframe = document.createElement('iframe');
  iframe.src = embedUrl;
  iframe.width  = '100%';
  iframe.height = iframeH;
  iframe.frameBorder = '0';
  iframe.allow = 'autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture';
  iframe.allowFullscreen = true;
  iframe.style.display = 'block';

  panel.innerHTML = '';
  panel.appendChild(header);
  panel.appendChild(iframe);
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function nuevaHistoria(tipo) {
  var hc = {
    id: Date.now().toString(),
    titulo: 'Historia Clínica ' + (historias.length + 1),
    tipo: tipo || 'formulario',
    createdAt: new Date().toISOString(),
    updatedAt: null,
    data: {},
    editorContent: ''
  };
  historias.push(hc);
  saveHistorias();
  abrirHistoria(historias.length - 1);
}

function eliminarHistoria(idx) {
  var hc = historias[idx];
  if (!hc) return;
  if (!confirm('¿Eliminar "' + (hc.titulo||'Sin título') + '"? Esta acción no se puede deshacer.')) return;
  historias.splice(idx, 1);
  saveHistorias();
  renderHistorias();
  toast('🗑 Historia eliminada');
}

// ── Abrir historia — dispatcher por tipo ─────────────────────
function abrirHistoria(idx) {
  var hc = historias[idx];
  if (!hc) return;
  var box = document.getElementById('modal-hc-box');
  box.innerHTML = '';
  if (hc.tipo === 'editor') {
    renderHCEditor(idx, box);
  } else {
    renderHCFormulario(idx, box);
  }
  openModal('modal-hc');
}

function mkAppRow(rowData, r, autoSave) {
  var div=document.createElement('div');
  div.className='hcf-app-row';
  div.style.cssText='display:grid;grid-template-columns:2fr 1fr 2fr;gap:6px;margin-bottom:5px;';

    var inp=document.createElement('input');
    inp.type='text'; inp.value=rowData[c]||'';
    inp.dataset.hctable='app'; inp.dataset.row=r; inp.dataset.col=c;
    inp.style.cssText='border:none;border-bottom:1.5px solid var(--border);padding:5px 2px;' +
      'font-family:\'Sora\',sans-serif;font-size:.83rem;background:transparent;outline:none;width:100%;box-sizing:border-box;';
    inp.onfocus=function(){ this.style.borderBottomColor='var(--navy)'; };
    inp.onblur=function(){ this.style.borderBottomColor='var(--border)'; };
    inp.oninput=autoSave;
    div.appendChild(inp);
  }
  return div;
}

// MODO 2 — EDITOR LIBRE (estilo Cuaderno con overlay de HC)
// ══════════════════════════════════════════════════════════════
function renderHCEditor(idx, box) {
  var hc = historias[idx];

  var _t = null;
  function autoSave(){
    clearTimeout(_t);
    _t = setTimeout(function(){
      var ed = document.getElementById('hce-editor');
      if(ed){ hc.editorContent = ed.innerHTML; }
      var tit = document.getElementById('hce-titulo');
      if(tit){ hc.titulo = tit.value || hc.titulo; }
      hc.updatedAt = new Date().toISOString();
      historias[idx] = hc;
      saveHistorias();
      var badge=document.getElementById('hce-saved');
      if(badge){ badge.style.opacity='1'; setTimeout(function(){ badge.style.opacity='0'; },1200); }
    }, 700);
  }

  // Header
  var hdr=document.createElement('div');
  hdr.style.cssText='display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid var(--sky-deep);';

  var titleInput=document.createElement('input');
  titleInput.id='hce-titulo'; titleInput.value=hc.titulo;
  titleInput.style.cssText='flex:1;font-family:\'Lora\',serif;font-size:1.05rem;font-weight:700;' +
    'border:none;border-bottom:2px solid var(--navy);border-radius:0;padding:4px 2px;background:transparent;outline:none;';
  titleInput.oninput=autoSave;

  var badge=document.createElement('span');
  badge.id='hce-saved'; badge.textContent='✓ Guardado';
  badge.style.cssText='font-size:.72rem;color:var(--sage);font-weight:600;opacity:0;transition:opacity .3s;flex-shrink:0;';

  var btnInsert=document.createElement('button');
  btnInsert.className='btn btn-secondary btn-sm';
  btnInsert.textContent='📋 Insertar plantilla HC';
  btnInsert.onclick=function(){ insertHCTemplate(idx); };

  var btnClose=document.createElement('button');
  btnClose.className='btn btn-ghost btn-sm btn-icon';
  btnClose.textContent='✕'; btnClose.style.fontSize='1rem';
  btnClose.onclick=function(){ autoSave(); setTimeout(function(){ closeModal('modal-hc'); renderHistorias(); },750); };

  hdr.appendChild(titleInput);
  hdr.appendChild(badge);
  hdr.appendChild(btnInsert);
  hdr.appendChild(btnClose);
  box.appendChild(hdr);

  // Toolbar
  var tb=document.createElement('div');
  tb.style.cssText='display:flex;flex-wrap:wrap;gap:4px;padding:8px;background:var(--gray-100);border-radius:var(--r-md);margin-bottom:10px;align-items:center;';

  var tools=[
    {cmd:'bold',html:'<b>N</b>'},{cmd:'italic',html:'<i>K</i>'},{cmd:'underline',html:'<u>S</u>'},
    '|',
    {cmd:'insertUnorderedList',html:'☰'},{cmd:'insertOrderedList',html:'1.'},
    '|',
    {cmd:'formatBlock-h3',html:'H3'},{cmd:'formatBlock-blockquote',html:'❝'},
    '|',
    {color:'#1B3A6B',title:'Azul'},{color:'#C2185B',title:'Rosa'},{color:'#2E7D32',title:'Verde'},
    '|',
    {cmd:'removeFormat',html:'✕ Formato'},
  ];

  tools.forEach(function(t){
    if(t==='|'){
      var sep=document.createElement('span');
      sep.style.cssText='width:1px;height:18px;background:var(--border);margin:0 2px;display:inline-block;align-self:center;';
      tb.appendChild(sep); return;
    }
    if(t.color){
      var sw=document.createElement('button');
      sw.title=t.title;
      sw.style.cssText='width:18px;height:18px;border-radius:50%;background:'+t.color+';border:2px solid transparent;cursor:pointer;flex-shrink:0;';
      sw.onclick=function(e){ e.preventDefault(); var ed=document.getElementById('hce-editor'); if(ed)ed.focus(); document.execCommand('foreColor',false,t.color); };
      tb.appendChild(sw); return;
    }
    var btn=document.createElement('button');
    btn.innerHTML=t.html;
    btn.style.cssText='padding:4px 8px;border-radius:6px;border:none;font-size:.78rem;background:transparent;cursor:pointer;';
    btn.onmouseenter=function(){ this.style.background='var(--sky)'; };
    btn.onmouseleave=function(){ this.style.background='transparent'; };
    var parts=(t.cmd||'').split('-');
    btn.onclick=function(e){ e.preventDefault(); var ed=document.getElementById('hce-editor'); if(ed)ed.focus(); document.execCommand(parts[0],false,parts[1]||null); };
    tb.appendChild(btn);
  });
  box.appendChild(tb);

  // Editor
  var ed=document.createElement('div');
  ed.id='hce-editor';
  ed.contentEditable='true';
  ed.style.cssText='min-height:400px;padding:16px;border:1.5px solid var(--border);border-radius:var(--r-md);' +
    'font-family:\'Sora\',sans-serif;font-size:.875rem;line-height:1.8;outline:none;' +
    'background:white;overflow-y:auto;';
  ed.innerHTML = hc.editorContent || getHCTemplateHTML();
  ed.oninput=autoSave;
  box.appendChild(ed);

  // Footer
  var footer=document.createElement('div');
  footer.style.cssText='padding-top:12px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;margin-top:10px;';
  var btnSave=document.createElement('button');
  btnSave.className='btn btn-primary';
  btnSave.textContent='💾 Guardar';
  btnSave.onclick=function(){
    var edEl=document.getElementById('hce-editor');
    if(edEl){ hc.editorContent=edEl.innerHTML; }
    var titEl=document.getElementById('hce-titulo');
    if(titEl){ hc.titulo=titEl.value||hc.titulo; }
    hc.updatedAt=new Date().toISOString();
    historias[idx]=hc; saveHistorias();
    toast('✅ Historia guardada');
  };
  footer.appendChild(btnSave);
  box.appendChild(footer);
}

// ── Plantilla HC como HTML para el editor libre ───────────────
function getHCTemplateHTML() {
  var s = '';
  function sec(t){ return '<h3 style="font-family:Georgia,serif;color:#1B3A6B;border-bottom:2px solid #1B3A6B;padding-bottom:4px;margin:18px 0 10px;font-size:.95rem;letter-spacing:.8px;">'+t+'</h3>'; }
  function row(l){ return '<p style="border-bottom:1px solid #ddd;padding:4px 0;margin:5px 0;font-size:.875rem;min-height:28px;"><b style="color:#555;font-size:.75rem;">'+l+':</b>&nbsp;</p>'; }

  s += '<div style="display:flex;justify-content:space-between;margin-bottom:12px;">' +
    '<span style="font-family:Georgia,serif;font-style:italic;font-size:1.3rem;color:#1B3A6B;">Historia Clínica</span>' +
    '<span style="font-size:.85rem;">Fecha: &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; / &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; / &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Hora: &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>' +
  '</div>';

  s += sec('DATOS DE FILIACIÓN');
  s += row('Nombres y Apellidos') + row('Sexo / Raza / Estado Civil') +
    row('Religión / Lateralidad / Discapacidad') +
    row('Grupo Sanguíneo / Transfusiones') + row('Lugar y Fecha de Nacimiento') +
    row('Residencia Habitual') + row('Instrucción / Profesión') +
    row('Teléfono') + row('Alergias');

  s += sec('A.P.P. — Antecedentes Patológicos Personales');
  s += '<p style="font-size:.72rem;color:#888;margin-bottom:6px;font-style:italic;">Patología infancia/adulto · Inmunizaciones · Medicamentos actuales</p>';
  s += '<table style="width:100%;border-collapse:collapse;margin-bottom:8px;">' +
    '<tr><th style="border:1px solid #ddd;padding:5px 8px;background:#f5f5f5;font-size:.75rem;text-align:left;width:40%;">Enfermedad</th>' +

      sec('MEDICAMENTOS HABITUALES')+row('',d.medicamentos&&d.medicamentos.texto)+

// ── Bootstrap Firebase from CDN ───────────────────────────────
function initFirebase(callback) {
  if (_fbApp) { callback && callback(); return; }

  var script1 = document.createElement('script');
  script1.src = 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js';
  script1.onload = function() {
    var script2 = document.createElement('script');
    script2.src = 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js';
    script2.onload = function() {
      var script3 = document.createElement('script');
      script3.src = 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js';
      script3.onload = function() {
        _fbApp  = firebase.initializeApp(FIREBASE_CONFIG);
        _fbAuth = firebase.auth();
        _fbDb   = firebase.firestore();
        console.log('[FB] Firebase ready');
        // Listen for auth state
        _fbAuth.onAuthStateChanged(function(user) {
          if (user) {
            _fbUser = user;
            onUserLoggedIn(user);
          } else {
            _fbUser = null;
            showLoginScreen();
          }
        });
        callback && callback();
      };
      document.head.appendChild(script3);
    };
    document.head.appendChild(script2);
  };
  document.head.appendChild(script1);
}

// ── Called when user is authenticated ────────────────────────
function onUserLoggedIn(user) {
  console.log('[FB] Logged in:', user.email || user.displayName);
  hideLoginScreen();
  updateUserBadge(user);
  // Load cloud data (overrides localStorage)
  loadFromCloud().then(function() {
    try { renderDashboard(); } catch(e) {}
  });
}

// ── Load all user data from Firestore ────────────────────────
function loadFromCloud() {
  if (!_fbUser || !_fbDb) return Promise.resolve();
  var uid = _fbUser.uid;
  return _fbDb.collection('users').doc(uid).get().then(function(doc) {
    if (doc.exists) {
      var d = doc.data();
      if (d.data)      { try { data      = JSON.parse(d.data); } catch(e){} }
      if (d.notes)     { try { notes     = JSON.parse(d.notes); } catch(e){} }
      if (d.examPlans) { try { examPlans = JSON.parse(d.examPlans); } catch(e){} }
      if (d.sessions)  { try { sessions  = JSON.parse(d.sessions); } catch(e){} }
      if (d.streak)    { try { streak    = JSON.parse(d.streak); } catch(e){} }
      if (d.historias) { try { historias = JSON.parse(d.historias); } catch(e){} }
      // Ensure all materias exist
      MATERIAS.forEach(function(m) {
        if (!data[m.id]) data[m.id] = { topics:[], progress:0 };
      });
      console.log('[FB] Cloud data loaded');
    } else {
      // First time user — push localStorage data to cloud
      console.log('[FB] New user, uploading local data');
      loadAll();  // load from localStorage first
      saveToCloud();
    }
  }).catch(function(e) {
    console.warn('[FB] Load error, using local:', e);
    loadAll();
  });
}

// ── Save all user data to Firestore (debounced) ───────────────
function saveToCloud() {
  if (!_fbUser || !_fbDb) { saveAll(); return; }  // fallback to localStorage
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(function() {
    var uid = _fbUser.uid;
    _fbDb.collection('users').doc(uid).set({
      data:      JSON.stringify(data),
      notes:     JSON.stringify(notes),
      examPlans: JSON.stringify(examPlans),
      sessions:  JSON.stringify(sessions),
      streak:    JSON.stringify(streak),
      historias: JSON.stringify(historias),
      updatedAt: new Date().toISOString(),
      email:     _fbUser.email || '',
      displayName: _fbUser.displayName || '',
    }, { merge: true }).then(function() {
      showSyncBadge();
      saveAll(); // also save locally as backup
    }).catch(function(e) {
      console.warn('[FB] Save error:', e);
      saveAll();
    });
  }, 1500);
}

// ── Override saveAll to also sync to cloud ───────────────────
var _origSaveAll = null;
function patchSaveAll() {
  _origSaveAll = saveAll;
  saveAll = function() {
    // Save to localStorage always
    try {
      localStorage.setItem('ss2_data',     JSON.stringify(data));
      localStorage.setItem('ss2_notes',    JSON.stringify(notes));
      localStorage.setItem('ss2_exams',    JSON.stringify(examPlans));
      localStorage.setItem('ss2_sessions', JSON.stringify(sessions));
      localStorage.setItem('ss2_streak',   JSON.stringify(streak));
      localStorage.setItem('ss2_historias',JSON.stringify(historias));
    } catch(e) {}
    // Also sync to cloud if logged in
    if (_fbUser && _fbDb) saveToCloud();
  };
}

    'width:100%;padding:13px;border-radius:12px;border:1.5px solid #ddd;',
    'background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;',
    'font-size:.88rem;font-weight:600;color:#333;margin-bottom:20px;',
    'transition:box-shadow .2s;',
  ].join('');
  btnGoogle.innerHTML =
    '<svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>' +
    'Continuar con Google';
  btnGoogle.onmouseenter = function(){ this.style.boxShadow='0 4px 16px rgba(0,0,0,.1)'; };
  btnGoogle.onmouseleave = function(){ this.style.boxShadow='none'; };
  btnGoogle.onclick = loginWithGoogle;
  card.appendChild(btnGoogle);

  // Divider
  var div = document.createElement('div');
  div.style.cssText = 'display:flex;align-items:center;gap:12px;width:100%;margin-bottom:20px;';
  div.innerHTML = '<div style="flex:1;height:1px;background:#eee;"></div><span style="font-size:.75rem;color:#aaa;">o</span><div style="flex:1;height:1px;background:#eee;"></div>';
  card.appendChild(div);

  // Email input
  var emailWrap = document.createElement('div');
  emailWrap.style.cssText = 'width:100%;margin-bottom:10px;';
  var emailLbl = document.createElement('div');
  emailLbl.style.cssText = 'font-size:.7rem;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;';
  emailLbl.textContent = 'Correo electrónico';
  var emailInp = document.createElement('input');
  emailInp.id = 'login-email'; emailInp.type = 'email'; emailInp.placeholder = 'tu@correo.com';
  emailInp.style.cssText = 'width:100%;padding:12px 14px;border:1.5px solid #ddd;border-radius:10px;font-size:.88rem;outline:none;box-sizing:border-box;font-family:\'Sora\',sans-serif;';
  emailInp.onfocus = function(){ this.style.borderColor='#0D6B5E'; };
  emailInp.onblur  = function(){ this.style.borderColor='#ddd'; };
  emailWrap.appendChild(emailLbl); emailWrap.appendChild(emailInp);
  card.appendChild(emailWrap);

  // Password input
  var passWrap = document.createElement('div');
  passWrap.style.cssText = 'width:100%;margin-bottom:20px;';
  var passLbl = document.createElement('div');
  passLbl.style.cssText = 'font-size:.7rem;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;';
  passLbl.textContent = 'Contraseña';
  var passInp = document.createElement('input');
  passInp.id = 'login-pass'; passInp.type = 'password'; passInp.placeholder = 'Mínimo 6 caracteres';
  passInp.style.cssText = emailInp.style.cssText;
  passInp.onfocus = function(){ this.style.borderColor='#0D6B5E'; };
  passInp.onblur  = function(){ this.style.borderColor='#ddd'; };
  passInp.onkeydown = function(e){ if(e.key==='Enter') loginWithEmail(); };
  passWrap.appendChild(passLbl); passWrap.appendChild(passInp);
  card.appendChild(passWrap);

  // Login button
  var btnLogin = document.createElement('button');
  btnLogin.style.cssText = [
    'width:100%;padding:13px;border-radius:12px;border:none;',
    'background:linear-gradient(135deg,#0D6B5E,#0A5549);color:white;',
    'font-size:.9rem;font-weight:700;cursor:pointer;margin-bottom:12px;',
    'font-family:\'Sora\',sans-serif;',
  ].join('');
  btnLogin.textContent = 'Iniciar sesión';
  btnLogin.onclick = loginWithEmail;
  card.appendChild(btnLogin);

  // Register link
  var regLink = document.createElement('div');
  regLink.style.cssText = 'font-size:.78rem;color:#888;text-align:center;margin-bottom:8px;';
  regLink.innerHTML = '¿No tienes cuenta? <span id="btn-register" style="color:#0D6B5E;font-weight:700;cursor:pointer;">Crear cuenta</span>';
  card.appendChild(regLink);

  // Forgot password
  var forgotLink = document.createElement('div');
  forgotLink.style.cssText = 'font-size:.75rem;color:#aaa;text-align:center;cursor:pointer;';
  forgotLink.textContent = '¿Olvidaste tu contraseña?';
  forgotLink.onclick = resetPassword;
  card.appendChild(forgotLink);

  screen.appendChild(card);
  document.body.appendChild(screen);

  document.getElementById('btn-register').onclick = showRegisterMode;
}

function hideLoginScreen() {
  var s = document.getElementById('login-screen');
  if (s) s.style.display = 'none';
}

function setLoginError(msg) {
  var el = document.getElementById('login-error');
  if (el) el.textContent = msg;
}

// ── Login with email ──────────────────────────────────────────
function loginWithEmail() {
  var email = (document.getElementById('login-email')||{}).value || '';
  var pass  = (document.getElementById('login-pass') ||{}).value || '';
  if (!email || !pass) { setLoginError('Completa todos los campos'); return; }
  setLoginError('');
  _fbAuth.signInWithEmailAndPassword(email, pass)
    .catch(function(e) {
      if (e.code === 'auth/user-not-found') setLoginError('No existe una cuenta con ese correo');
      else if (e.code === 'auth/wrong-password') setLoginError('Contraseña incorrecta');
      else if (e.code === 'auth/invalid-email') setLoginError('Correo inválido');
      else setLoginError('Error: ' + e.message);
    });
}

// ── Login with Google ─────────────────────────────────────────
function loginWithGoogle() {
  var provider = new firebase.auth.GoogleAuthProvider();
  _fbAuth.signInWithPopup(provider).catch(function(e) {
    setLoginError('Error con Google: ' + e.message);
  });
}

// ── Register mode ─────────────────────────────────────────────
function showRegisterMode() {
  // Swap button to "Crear cuenta"
  var btn = document.querySelector('#login-screen button:nth-of-type(2)');
  // Simpler: find login button by text
  document.querySelectorAll('#login-screen button').forEach(function(b) {
    if (b.textContent === 'Iniciar sesión') {
      b.textContent = 'Crear cuenta';
      b.onclick = registerWithEmail;
    }
  });
  var lnk = document.getElementById('btn-register');
  if (lnk) {
    lnk.parentElement.innerHTML = '¿Ya tienes cuenta? <span id="btn-register" style="color:#0D6B5E;font-weight:700;cursor:pointer;">Iniciar sesión</span>';
    document.getElementById('btn-register').onclick = function() {
      // swap back
      document.querySelectorAll('#login-screen button').forEach(function(b) {
        if (b.textContent === 'Crear cuenta') {
          b.textContent = 'Iniciar sesión';
          b.onclick = loginWithEmail;
        }
      });
      lnk.parentElement.innerHTML = '¿No tienes cuenta? <span id="btn-register" style="color:#0D6B5E;font-weight:700;cursor:pointer;">Crear cuenta</span>';
      document.getElementById('btn-register').onclick = showRegisterMode;
    };
  }
  setLoginError('');
}

function registerWithEmail() {
  var email = (document.getElementById('login-email')||{}).value || '';
  var pass  = (document.getElementById('login-pass') ||{}).value || '';
  if (!email || !pass) { setLoginError('Completa todos los campos'); return; }
  if (pass.length < 6)  { setLoginError('La contraseña debe tener al menos 6 caracteres'); return; }
  setLoginError('');
  _fbAuth.createUserWithEmailAndPassword(email, pass)
    .then(function(cred) {
      toast('🎉 ¡Cuenta creada! Bienvenida a STATstudy');
    })
    .catch(function(e) {
      if (e.code === 'auth/email-already-in-use') setLoginError('Ya existe una cuenta con ese correo');
      else if (e.code === 'auth/invalid-email') setLoginError('Correo inválido');
      else if (e.code === 'auth/weak-password') setLoginError('Contraseña muy débil');
      else setLoginError('Error: ' + e.message);
    });
}

// ── Reset password ────────────────────────────────────────────
function resetPassword() {
  var email = (document.getElementById('login-email')||{}).value || '';
  if (!email) { setLoginError('Escribe tu correo primero'); return; }
  _fbAuth.sendPasswordResetEmail(email).then(function() {
    setLoginError('');
    toast('📧 Correo de recuperación enviado a ' + email, 4000);
  }).catch(function(e) {
    setLoginError('Error: ' + e.message);
  });
}


</script>
