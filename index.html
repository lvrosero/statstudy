<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1B3A6B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StatStudy">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="StatStudy">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>StatStudy — Medicoblast Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════ */
:root {
  /* Brand colors */
  --navy:       #1B3A6B;
  --navy-mid:   #2A4F8F;
  --navy-light: #3D6BB5;
  --sky:        #E8EFF8;
  --sky-deep:   #C8D9EF;

  --sage:       #4A5E3A;
  --sage-mid:   #6B7F5A;
  --sage-light: #E8EDE3;

  --sand:       #C4A882;
  --sand-light: #F5EFE6;
  --sand-deep:  #8B7355;

  --salmon:     #E8826A;
  --salmon-light:#FDF0EC;

  --white:      #FFFFFF;
  --off-white:  #F8F7F4;
  --gray-100:   #F2F1EE;
  --gray-200:   #E5E3DE;
  --gray-300:   #C8C5BE;
  --gray-400:   #9E9A91;
  --gray-600:   #6B6760;
  --gray-800:   #2D2B27;

  /* Semantic */
  --bg:         #F8F7F4;
  --surface:    #FFFFFF;
  --border:     #E5E3DE;
  --text:       #2D2B27;
  --text-mid:   #6B6760;
  --text-light: #9E9A91;
  --accent:     #1B3A6B;
  --accent-hover:#2A4F8F;

  /* Nav */
  --nav-h: 64px;

  /* Radius */
  --r-sm: 8px;
  --r-md: 14px;
  --r-lg: 20px;
  --r-xl: 28px;

  /* Shadow */
  --shadow-sm: 0 1px 3px rgba(27,58,107,.07), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 16px rgba(27,58,107,.1), 0 1px 4px rgba(0,0,0,.05);
  --shadow-lg: 0 12px 40px rgba(27,58,107,.14), 0 2px 8px rgba(0,0,0,.06);
}

/* ═══════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
  font-family: 'Sora', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
  min-height: 100dvh;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; }
input, textarea, select { font-family: inherit; }
img, svg { display: block; max-width: 100%; }

/* ═══════════════════════════════════════════
   TYPOGRAPHY
═══════════════════════════════════════════ */
.t-display {
  font-family: 'Lora', serif;
  font-size: clamp(1.4rem, 4vw, 2rem);
  font-weight: 600; line-height: 1.2;
}
.t-title  { font-size: clamp(1rem, 3vw, 1.25rem); font-weight: 600; }
.t-body   { font-size: .9rem; }
.t-small  { font-size: .78rem; color: var(--text-mid); }
.t-mono   { font-family: 'JetBrains Mono', monospace; }
.t-label  {
  font-size: .68rem; font-weight: 600; letter-spacing: 1.2px;
  text-transform: uppercase; color: var(--text-light);
}

/* ═══════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════ */
.app-shell {
  display: flex; flex-direction: column;
  min-height: 100dvh;
}

/* Header */
.app-header {
  background: var(--navy);
  padding: clamp(14px,3vw,22px) clamp(16px,4vw,32px);
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; position: sticky; top: 0; z-index: 200;
  box-shadow: 0 2px 20px rgba(27,58,107,.3);
}
.header-brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
.brand-icon {
  width: clamp(28px,6vw,36px); height: clamp(28px,6vw,36px);
  background: rgba(255,255,255,.15);
  border-radius: 10px; display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; font-size: 1.1rem;
}
.brand-name {
  font-family: 'Lora', serif;
  font-size: clamp(.82rem, 2.5vw, 1rem);
  font-weight: 600; color: white;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.brand-sub {
  font-size: clamp(.58rem, 1.8vw, .7rem);
  color: rgba(255,255,255,.6);
  white-space: nowrap;
}
.header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.header-btn {
  width: 36px; height: 36px; border-radius: 10px;
  background: rgba(255,255,255,.12);
  color: rgba(255,255,255,.85); font-size: .95rem;
  display: flex; align-items: center; justify-content: center;
  transition: background .2s;
}
.header-btn:hover { background: rgba(255,255,255,.22); }

/* Main scroll area */
.app-main {
  flex: 1;
  padding: 20px clamp(14px,4vw,28px) calc(var(--nav-h) + 20px + env(safe-area-inset-bottom));
  max-width: 900px; margin: 0 auto; width: 100%;
}

/* Bottom nav */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(var(--nav-h) + env(safe-area-inset-bottom));
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex; align-items: stretch;
  box-shadow: 0 -4px 24px rgba(27,58,107,.08);
  z-index: 200; padding-bottom: env(safe-area-inset-bottom);
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px; padding: 8px 4px;
  color: var(--gray-400); transition: color .2s;
  position: relative;
}
.nav-btn.active { color: var(--navy); }
.nav-btn.active::after {
  content: ''; position: absolute; top: 0; left: 50%;
  transform: translateX(-50%);
  width: 28px; height: 3px; background: var(--navy);
  border-radius: 0 0 4px 4px;
}
.nav-icon { font-size: 1.3rem; line-height: 1; }
.nav-label { font-size: .56rem; font-weight: 600; letter-spacing: .3px; text-transform: uppercase; }

/* Sections */
.section { display: none; animation: fadeIn .22s ease; }
.section.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

/* ═══════════════════════════════════════════
   CARDS & SURFACES
═══════════════════════════════════════════ */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: clamp(16px,3vw,22px);
  box-shadow: var(--shadow-sm);
}
.card + .card { margin-top: 14px; }
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; gap: 10px;
}
.card-title {
  font-weight: 600; font-size: .92rem;
  display: flex; align-items: center; gap: 7px;
}
.card-title .icon {
  width: 28px; height: 28px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: .9rem; flex-shrink: 0;
}
.icon-navy  { background: var(--sky); color: var(--navy); }
.icon-sage  { background: var(--sage-light); color: var(--sage); }
.icon-sand  { background: var(--sand-light); color: var(--sand-deep); }
.icon-salmon{ background: var(--salmon-light); color: var(--salmon); }

/* ═══════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════ */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px; padding: 10px 20px; border-radius: var(--r-md);
  font-size: .87rem; font-weight: 600; transition: all .18s;
  line-height: 1;
}
.btn-primary {
  background: var(--navy); color: white;
  box-shadow: 0 2px 8px rgba(27,58,107,.3);
}
.btn-primary:hover { background: var(--navy-mid); box-shadow: 0 4px 14px rgba(27,58,107,.4); transform: translateY(-1px); }
.btn-secondary {
  background: var(--sky); color: var(--navy); border: 1px solid var(--sky-deep);
}
.btn-secondary:hover { background: var(--sky-deep); }
.btn-ghost {
  background: transparent; color: var(--navy);
  border: 1.5px solid var(--border);
}
.btn-ghost:hover { background: var(--sky); border-color: var(--sky-deep); }
.btn-sage  { background: var(--sage); color: white; }
.btn-salmon{ background: var(--salmon); color: white; }
.btn-sm    { padding: 7px 14px; font-size: .8rem; border-radius: var(--r-sm); }
.btn-lg    { padding: 14px 28px; font-size: .95rem; }
.btn-full  { width: 100%; }
.btn-icon  { padding: 9px; border-radius: var(--r-sm); }

/* ═══════════════════════════════════════════
   FORM ELEMENTS
═══════════════════════════════════════════ */
.field { margin-bottom: 14px; }
.field-label {
  display: block; font-size: .78rem; font-weight: 600;
  color: var(--text-mid); margin-bottom: 6px; letter-spacing: .2px;
}
.input, .select, .textarea {
  width: 100%; padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--r-md); background: var(--surface);
  font-family: inherit; font-size: .88rem; color: var(--text);
  transition: border-color .18s, box-shadow .18s; outline: none;
}
.input:focus, .select:focus, .textarea:focus {
  border-color: var(--navy-light);
  box-shadow: 0 0 0 3px rgba(27,58,107,.1);
}
.textarea { resize: vertical; min-height: 100px; line-height: 1.7; }

/* ═══════════════════════════════════════════
   CHIPS / TAGS
═══════════════════════════════════════════ */
.chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 99px;
  font-size: .72rem; font-weight: 600; line-height: 1;
}
.chip-navy   { background: var(--sky); color: var(--navy); }
.chip-sage   { background: var(--sage-light); color: var(--sage); }
.chip-salmon { background: var(--salmon-light); color: var(--salmon); }
.chip-sand   { background: var(--sand-light); color: var(--sand-deep); }
.chip-gray   { background: var(--gray-100); color: var(--gray-600); }

/* ═══════════════════════════════════════════
   PROGRESS BAR
═══════════════════════════════════════════ */
.progress-track {
  height: 6px; background: var(--gray-100);
  border-radius: 99px; overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 99px;
  background: linear-gradient(90deg, var(--navy-light), var(--navy));
  transition: width .5s cubic-bezier(.4,0,.2,1);
}
.progress-fill.sage  { background: linear-gradient(90deg, var(--sage-mid), var(--sage)); }
.progress-fill.salmon{ background: linear-gradient(90deg, var(--salmon), #c06045); }

/* ═══════════════════════════════════════════
   DIVIDER
═══════════════════════════════════════════ */
.divider { height: 1px; background: var(--border); margin: 16px 0; }

/* ═══════════════════════════════════════════
   EMPTY STATE
═══════════════════════════════════════════ */
.empty {
  text-align: center; padding: 36px 20px;
  color: var(--text-light);
}
.empty-icon { font-size: 2.2rem; margin-bottom: 10px; }
.empty h3 { font-size: .95rem; color: var(--text-mid); margin-bottom: 6px; }
.empty p  { font-size: .82rem; }

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
.toast {
  position: fixed; bottom: calc(var(--nav-h) + 16px + env(safe-area-inset-bottom));
  left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--gray-800); color: white;
  padding: 10px 20px; border-radius: 99px;
  font-size: .82rem; font-weight: 500;
  opacity: 0; transition: all .3s; pointer-events: none; z-index: 999;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ═══════════════════════════════════════════
   MODAL
═══════════════════════════════════════════ */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(27,58,107,.35);
  backdrop-filter: blur(4px);
  z-index: 500; align-items: center; justify-content: center;
  padding: 16px;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--surface); border-radius: var(--r-xl);
  padding: clamp(20px,4vw,28px);
  width: 100%; max-width: 480px;
  max-height: 88vh; overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: modalIn .22s ease;
}
@keyframes modalIn { from { opacity:0; transform:scale(.96) translateY(8px); } to { opacity:1; transform:none; } }
.modal-title {
  font-family: 'Lora', serif; font-size: 1.1rem;
  font-weight: 600; margin-bottom: 18px;
  display: flex; align-items: center; justify-content: space-between;
}
.modal-close {
  width: 28px; height: 28px; border-radius: 8px;
  background: var(--gray-100); color: var(--gray-600);
  display: flex; align-items: center; justify-content: center;
  font-size: .85rem;
}
.modal-close:hover { background: var(--gray-200); }

/* ═══════════════════════════════════════════
   SECTION PAGE TITLES
═══════════════════════════════════════════ */
.page-header { margin-bottom: 20px; }
.page-title {
  font-family: 'Lora', serif;
  font-size: clamp(1.2rem, 4vw, 1.5rem);
  font-weight: 600; color: var(--text);
  display: flex; align-items: center; gap: 8px;
}
.page-sub { font-size: .82rem; color: var(--text-light); margin-top: 3px; }

/* ═══════════════════════════════════════════
   SCROLLBAR
═══════════════════════════════════════════ */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 99px; }

/* ═══════════════════════════════════════════
   PRINT OVERLAY (hidden)
═══════════════════════════════════════════ */
#print-overlay { display: none; }
@media print {
  body > * { display: none !important; visibility: hidden !important; }
  #print-overlay {
    display: block !important; visibility: visible !important;
    position: fixed !important; inset: 0 !important;
    background: white !important; padding: 16mm !important;
    color: #000 !important; z-index: 99999 !important;
  }
  #print-overlay * { visibility: visible !important; }
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  @page { margin: 14mm; size: A4; }
}

  /* ── NOTE OVERLAY ─────────────────────────────────────── */
  #note-overlay.open { display: flex !important; flex-direction: column; }

  .note-style-btn {
    padding: 4px 12px; border-radius: 99px;
    border: 1.5px solid var(--border); background: var(--surface);
    font-size: .72rem; font-weight: 600; cursor: pointer;
    color: var(--text-mid); transition: all .15s;
    font-family: 'Sora', sans-serif;
  }
  .note-style-btn.active, .note-style-btn:hover {
    background: var(--navy); color: white; border-color: var(--navy);
  }
  /* Note topic list in sidebar */
  .note-topic-btn {
    width: 100%; text-align: left; padding: 8px 10px;
    border-radius: var(--r-sm); border: none; background: transparent;
    cursor: pointer; font-family: 'Sora', sans-serif; font-size: .8rem;
    color: var(--text); display: flex; align-items: center; gap: 7px;
    transition: background .15s; line-height: 1.35;
  }
  .note-topic-btn:hover { background: var(--sky); }
  .note-topic-btn.active {
    background: var(--navy); color: white; font-weight: 600;
  }
  .note-topic-btn .note-dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    background: var(--navy-light);
  }
  .note-topic-btn.active .note-dot { background: rgba(255,255,255,.6); }
  .note-sidebar-section {
    padding: 6px 10px 3px;
    font-size: .62rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.2px; color: var(--text-light);
    margin-top: 6px;
  }
  /* Lined paper */
  #note-ov-editor.lined {
    background-image: repeating-linear-gradient(
      transparent, transparent 29px, var(--gray-200) 29px, var(--gray-200) 30px);
    background-size: 100% 30px; background-attachment: local;
  }
  /* Grid paper */
  #note-ov-editor.grid {
    background-image:
      linear-gradient(var(--gray-200) 1px, transparent 1px),
      linear-gradient(90deg, var(--gray-200) 1px, transparent 1px);
    background-size: 24px 24px;
  }
  /* Editor placeholder */
  #note-ov-editor:empty::before {
    content: attr(data-placeholder);
    color: var(--gray-300); pointer-events: none;
  }
  /* Callout blocks */
  .callout-perla      { background:#FFF8E1; border-left:4px solid #FFB300; padding:10px 14px; border-radius:6px; margin:10px 0; }
  .callout-tip        { background:#E8F5E9; border-left:4px solid #43A047; padding:10px 14px; border-radius:6px; margin:10px 0; }
  .callout-importante { background:#FCE4EC; border-left:4px solid #E53935; padding:10px 14px; border-radius:6px; margin:10px 0; }
  /* Quick insert buttons */
  .qi-btn {
    padding: 4px 11px; border-radius: 99px; border: 1.5px solid transparent;
    font-size: .72rem; font-weight: 600; cursor: pointer;
    font-family: 'Sora', sans-serif; transition: all .15s;
  }
  .qi-perla      { background:#FFF8E1; color:#E65100; border-color:#FFE082; }
  .qi-tip        { background:#E8F5E9; color:#2E7D32; border-color:#A5D6A7; }
  .qi-importante { background:#FCE4EC; color:#C62828; border-color:#F48FB1; }
  /* Note tag pills */
  .note-tag-pill {
    padding: 3px 11px; border-radius: 99px;
    font-size: .7rem; font-weight: 600; cursor: pointer;
    border: 1.5px solid; transition: all .15s;
    font-family: 'Sora', sans-serif;
  }
  /* Mobile: hide sidebar, show as bottom sheet toggle */
  @media (max-width: 640px) {
    #note-ov-sidebar {
      width: 100% !important; height: 200px;
      border-right: none !important; border-bottom: 1px solid var(--border);
      flex-direction: row; flex-shrink: 0;
    }
    #note-overlay > div:last-child { flex-direction: column !important; }
    #note-ov-topic-list { flex-direction: row; flex-wrap: nowrap; overflow-x: auto; padding: 6px; }
    .note-topic-btn { min-width: 120px; white-space: nowrap; }
    .note-sidebar-section { display: none; }
  }
  @media (min-width: 641px) {
    #note-ov-sidebar { display: flex !important; }
  }

@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(20px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
</style>
</head>
<body>
<div class="app-shell">

  <!-- ── HEADER ─────────────────────────────────────────── -->
  <header class="app-header">
    <div class="header-brand">
      <div class="brand-icon">🩺</div>
      <div>
        <div class="brand-name">StatStudy</div>
        <div class="brand-sub">Medicoblast Hub</div>
      </div>
    </div>
    <div class="header-right">
      <button class="header-btn" onclick="showStreakInfo()" title="Racha">🔥</button>
      <button class="header-btn" id="header-pom-btn" onclick="showSection('sesion')" title="Pomodoro">⏱</button>
    </div>
  </header>

  <!-- ── MAIN ───────────────────────────────────────────── -->
  <main class="app-main" id="app-main" style="padding-top:44px;">

    <!-- ══ 1. DASHBOARD ══════════════════════════════════ -->
    <section id="section-dashboard" class="section active"></section>

    <!-- ══ 2. CUADERNO ════════════════════════════════════ -->
    <section id="section-cuaderno" class="section"></section>

    <!-- ══ 3. PLANIFICADOR ════════════════════════════════ -->
    <section id="section-planificador" class="section"></section>

    <!-- ══ 4. SESIÓN ══════════════════════════════════════ -->
    <section id="section-sesion" class="section"></section>

    <!-- ══ 5. PROGRESO ════════════════════════════════════ -->
    <section id="section-progreso" class="section"></section>

    <!-- ══ 6. HISTORIAS CLÍNICAS ═══════════════════════════ -->
    <section id="section-historias" class="section"></section>

  </main>

  <!-- ── BOTTOM NAV ─────────────────────────────────────── -->
  <div id="top-bar" style="position:fixed;top:0;left:0;right:0;height:44px;background:rgba(245,243,238,.92);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:400;border-bottom:1px solid rgba(27,58,107,.08);">
    <div style="font-family:'Lora',serif;font-size:.88rem;font-weight:700;color:#0D3D35;">STAT<span style="font-weight:300;color:#4A7A74;">study</span></div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span id="sync-badge" style="font-size:.7rem;color:#0D6B5E;font-weight:600;opacity:0;transition:opacity .4s;">☁️ Sincronizado</span>
      <div id="user-badge" style="display:none;align-items:center;gap:6px;cursor:pointer;padding:4px 8px;border-radius:99px;background:rgba(13,107,94,.08);"></div>
    </div>
  </div>
<nav class="bottom-nav">
    <button class="nav-btn active" id="bn-dashboard" onclick="showSection('dashboard')">
      <span class="nav-icon">🏠</span><span class="nav-label">Inicio</span>

// ── Load / Save ────────────────────────────────────────────────

function loadAll() {
  try {
    var d = localStorage.getItem('ss2_data');
    var n = localStorage.getItem('ss2_notes');
    var e = localStorage.getItem('ss2_exams');
    var s = localStorage.getItem('ss2_sessions');
    var st= localStorage.getItem('ss2_streak');
    if (d) { data = JSON.parse(d); }
    if (n) notes = JSON.parse(n);
    if (e) examPlans = JSON.parse(e);
    if (s) sessions  = JSON.parse(s);
    if (st) streak   = JSON.parse(st);
  } catch(e2) { /* ignore parse errors */ }
  // Ensure every materia has a data entry
  MATERIAS.forEach(function(m) {
    if (!data[m.id]) data[m.id] = { topics: [], progress: 0 };
  });
  loadHistorias();
}


function saveAll() {
  try {
    localStorage.setItem('ss2_data',     JSON.stringify(data));
    localStorage.setItem('ss2_notes',    JSON.stringify(notes));
    localStorage.setItem('ss2_exams',    JSON.stringify(examPlans));
    localStorage.setItem('ss2_sessions', JSON.stringify(sessions));
    localStorage.setItem('ss2_streak',   JSON.stringify(streak));
  } catch(e) { console.warn('save error', e); }
}

// ── Navigation ─────────────────────────────────────────────────

function showSection(id) {
  document.querySelectorAll('.section').forEach(function(s){ s.classList.remove('active'); });
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });
  var sec = document.getElementById('section-' + id);
  var btn = document.getElementById('bn-' + id);
  if (sec) sec.classList.add('active');
  if (btn) btn.classList.add('active');
  currentSection = id;
  window.scrollTo({ top: 0, behavior: 'instant' });
  renderSection(id);
}


function renderSection(id) {
  if      (id === 'dashboard')    renderDashboard();
  else if (id === 'cuaderno')     renderCuaderno();
  else if (id === 'planificador') renderPlanificador();
  else if (id === 'sesion')       renderSesion();
  else if (id === 'progreso')     renderProgreso();
  else if (id === 'historias')    renderHistorias();
  else if (id === 'historias')    renderHistorias();
}

// HELPERS
// ═══════════════════════════════════════════════════════════════

function fmtDate(iso) {
  if (!iso) return '';
  var d = new Date(iso + (iso.length === 10 ? 'T00:00:00' : ''));
  return d.toLocaleDateString('es-ES', { day:'numeric', month:'short', year:'numeric' });
}

function todayISO() {
  return new Date().toISOString().split('T')[0];
}

function daysUntil(isoDate) {
  var now  = new Date(); now.setHours(0,0,0,0);
  var then = new Date(isoDate + 'T00:00:00');
  return Math.round((then - now) / 86400000);
}

function addDays(isoDate, n) {
  var d = new Date(isoDate + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return d.toISOString().split('T')[0];
}

function toast(msg, dur) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(function(){ el.classList.remove('show'); }, dur || 2200);
}

function closeModalIfOverlay(e, id) {
  if (e.target.id === id) closeModal(id);
}

function closeModal(id) {
  var el = document.getElementById(id);
  if (el) el.classList.remove('open');
}

function openModal(id) {
  document.getElementById(id).classList.add('open');
}

function getMateria(id) {
  return MATERIAS.find(function(m){ return m.id === id; });
}

function calcProgress(mid) {
  var t = data[mid].topics;
  if (!t.length) return 0;
  return Math.round(t.filter(function(x){ return x.done; }).length / t.length * 100);
}

function updateStreak() {
  var today = todayISO();
  if (streak.lastDate !== today) {
    var yesterday = addDays(today, -1);
    if (streak.lastDate === yesterday) {
      streak.count++;
    } else if (streak.lastDate !== today) {
      streak.count = 1;
    }
    streak.lastDate = today;
    saveAll();
  }
}

function showStreakInfo() {
  toast('🔥 Racha actual: ' + streak.count + ' día' + (streak.count !== 1 ? 's' : ''), 3000);
}

function renderDashboard() {
  var today = todayISO();
  var sec = document.getElementById('section-dashboard');

  // Today's topics from exam plans
  var todayTopics = [];
  examPlans.forEach(function(plan) {
    if (!plan.plan) return;
    plan.plan.forEach(function(day) {
      if (day.date === today) {
        var m = getMateria(plan.materiaId);
        todayTopics.push({
          label: day.label,
          materia: m ? m.name : plan.materia,
          materiaId: plan.materiaId,
          type: day.type,
          planId: plan.id,
        });
      }
    });
  });

  // Nearest exam
  var upcoming = examPlans
    .filter(function(p){ return daysUntil(p.examDate) >= 0; })
    .sort(function(a,b){ return new Date(a.examDate) - new Date(b.examDate); });
  var nextExam = upcoming[0] || null;

  // Weekly stats
  var weekAgo = addDays(today, -6);
  var weekSessions = sessions.filter(function(s){ return s.date >= weekAgo && s.date <= today; });
  var weekMinutes   = weekSessions.reduce(function(a,s){ return a + (s.minutes||0); }, 0);
  var weekTopics    = weekSessions.filter(function(s){ return s.completed; }).length;

  // Completed topics
  var totalDone = MATERIAS.reduce(function(a,m){
    return a + data[m.id].topics.filter(function(t){ return t.done; }).length;
  }, 0);
  var totalTopics = MATERIAS.reduce(function(a,m){ return a + data[m.id].topics.length; }, 0);
  var avgProg = totalTopics > 0
    ? Math.round(MATERIAS.reduce(function(a,m){ return a + calcProgress(m.id); },0) / MATERIAS.length)
    : 0;

  sec.innerHTML =
    // Welcome
    '<div style="margin-bottom:22px;">' +
      '<p class="t-label" style="margin-bottom:4px;">Bienvenido/a, Doc 👋</p>' +
      '<h1 class="t-display">Tu cuaderno inteligente de medicina</h1>' +
      '<p class="t-small" style="margin-top:4px;">Organiza · Planifica · Estudia con técnicas científicas</p>' +
    '</div>' +

    // Quick stats row
    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;">' +
      statPill('📚', totalTopics || '0', 'Temas') +
      statPill('✅', totalDone  || '0', 'Dominados') +
      statPill('📈', avgProg + '%', 'Progreso') +
    '</div>' +

    // Today's study plan
    '<div class="card" style="margin-bottom:14px;">' +
      '<div class="card-header">' +
        '<div class="card-title"><span class="icon icon-navy">📋</span>Hoy debes estudiar</div>' +
        '<button class="btn btn-sm btn-secondary" onclick="showSection(\'planificador\')">+ Plan</button>' +
      '</div>' +
      (todayTopics.length === 0
        ? '<div class="empty" style="padding:20px 0;"><div class="empty-icon">🗒️</div><p>Sin sesiones programadas para hoy.<br>Crea un plan de estudio.</p></div>'
        : '<div style="display:flex;flex-direction:column;gap:8px;">' +
            todayTopics.map(function(t){
              return '<div style="display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--sky);border-radius:var(--r-md);border:1px solid var(--sky-deep);">' +
                '<div style="width:8px;height:8px;border-radius:50%;background:' + (t.type==='repaso'?'#E8826A':'#1B3A6B') + ';flex-shrink:0;"></div>' +
                '<div style="flex:1;min-width:0;">' +
                  '<div style="font-size:.85rem;font-weight:600;color:var(--navy);">' + t.materia + '</div>' +
                  '<div style="font-size:.75rem;color:var(--text-mid);">' + t.label + '</div>' +
                '</div>' +
                '<span class="chip ' + (t.type==='repaso'?'chip-salmon':'chip-navy') + '">' + (t.type==='repaso'?'Repaso':'Estudio') + '</span>' +
              '</div>';
            }).join('') +
          '</div>'
      ) +
    '</div>' +

    // CTA + Pomodoro row
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;">' +
      '<button class="btn btn-primary btn-full btn-lg" onclick="startFocusSession()" style="border-radius:var(--r-lg);flex-direction:column;height:80px;gap:4px;">' +
        '<span style="font-size:1.1rem;">▶</span>' +
        '<span style="font-size:.82rem;">Iniciar sesión</span>' +
      '</button>' +
      '<div class="card" style="padding:14px;text-align:center;cursor:pointer;" onclick="showSection(\'sesion\')">' +
        '<div id="dash-pom-display" class="t-mono" style="font-size:1.4rem;font-weight:600;color:var(--navy);">' + pomDisplay() + '</div>' +
        '<div class="t-label" style="margin-top:3px;">Pomodoro</div>' +
      '</div>' +
    '</div>' +

    // Weekly progress
    '<div class="card" style="margin-bottom:14px;">' +
      '<div class="card-header"><div class="card-title"><span class="icon icon-sage">📅</span>Esta semana</div></div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">' +
        weekStat('⏱', Math.round(weekMinutes/60*10)/10 + 'h', 'Estudiadas') +
        weekStat('🎯', weekTopics, 'Sesiones completadas') +
      '</div>' +
      '<div style="margin-top:14px;">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">' +
          '<span class="t-small">Progreso general</span>' +
          '<span style="font-size:.8rem;font-weight:600;color:var(--navy);">' + avgProg + '%</span>' +
        '</div>' +
        '<div class="progress-track"><div class="progress-fill" style="width:' + avgProg + '%;"></div></div>' +
      '</div>' +
    '</div>' +

    // Next exam
    (nextExam
      ? '<div class="card" style="background:var(--navy);border-color:var(--navy-mid);">' +
          '<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;">' +
            '<div>' +
              '<div class="t-label" style="color:rgba(255,255,255,.6);margin-bottom:4px;">Próximo examen</div>' +
              '<div style="font-weight:700;font-size:.95rem;color:white;">' + nextExam.materia + '</div>' +
              '<div style="font-size:.78rem;color:rgba(255,255,255,.75);margin-top:2px;">' + fmtDate(nextExam.examDate) + '</div>' +
            '</div>' +
            '<div style="text-align:center;background:rgba(255,255,255,.12);border-radius:var(--r-md);padding:12px 16px;">' +
              '<div class="t-mono" style="font-size:1.6rem;font-weight:700;color:white;">' + Math.max(0,daysUntil(nextExam.examDate)) + '</div>' +
              '<div style="font-size:.62rem;color:rgba(255,255,255,.65);text-transform:uppercase;letter-spacing:1px;">días</div>' +
            '</div>' +
          '</div>' +
        '</div>'
      : '<div class="card" style="text-align:center;padding:18px;">' +
          '<p class="t-small">Sin exámenes programados · ' +
          '<button class="btn btn-sm btn-secondary" onclick="showSection(\'planificador\')" style="margin-left:4px;">Crear plan →</button></p>' +
        '</div>'
    ) +
    '';
}


function statPill(icon, val, lbl) {
  return '<div class="card" style="padding:14px;text-align:center;">' +
    '<div style="font-size:1.1rem;margin-bottom:4px;">' + icon + '</div>' +
    '<div style="font-size:1.2rem;font-weight:700;color:var(--navy);font-family:\'Lora\',serif;">' + val + '</div>' +
    '<div class="t-label">' + lbl + '</div>' +
  '</div>';
}

function weekStat(icon, val, lbl) {
  return '<div style="background:var(--gray-100);border-radius:var(--r-md);padding:14px;">' +
    '<div style="font-size:1.05rem;margin-bottom:4px;">' + icon + '</div>' +
    '<div style="font-size:1.1rem;font-weight:700;color:var(--text);">' + val + '</div>' +
    '<div class="t-label">' + lbl + '</div>' +
  '</div>';
}


// ═══════════════════════════════════════════════════════════════
// SECTION 2 — CUADERNO MÉDICO
// ═══════════════════════════════════════════════════════════════

function renderCuaderno() {
  var sec = document.getElementById('section-cuaderno');
  if (!nb.materiaId) {
    // ── Materia grid ──────────────────────────────────────────
    sec.innerHTML =
      '<div class="page-header">' +
        '<h2 class="page-title">📖 Cuaderno médico</h2>' +
        '<p class="page-sub">Selecciona una materia para ver y editar tus apuntes</p>' +
      '</div>' +
      '<div id="materia-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(min(150px,100%),1fr));gap:10px;"></div>';

    var grid = document.getElementById('materia-grid');
    var lastGroup = null;
    MATERIAS.forEach(function(m) {
      if (m.group !== lastGroup) {
        lastGroup = m.group;
        var gh = document.createElement('div');
        gh.style.cssText = 'grid-column:1/-1;padding:8px 2px 4px;font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--navy);border-bottom:2px solid var(--sky-deep);margin-top:10px;';
        var glabels = {'Ciencias Basicas':'🔬 Ciencias Básicas','Clinicas':'🏥 Clínicas - Quirúrgicas','Complementarias':'🌐 Complementarias','Idiomas':'🗣️ Idiomas'};
        var gkey = (m.group||'').replace(/[áéíóú]/g,function(c){return {á:'a',é:'e',í:'i',ó:'o',ú:'u'}[c]||c;}).replace(/\s/g,'');
        gh.textContent = glabels[gkey] || m.group;
        grid.appendChild(gh);
      }
      var prog       = calcProgress(m.id);
      var topicCount = data[m.id].topics.length;
      var noteCount  = Object.keys(notes).filter(function(k){ return k.startsWith(m.id + '::'); }).length;
      var btn = document.createElement('button');
      btn.style.cssText = 'background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:16px 14px;text-align:left;transition:all .18s;cursor:pointer;';
      btn.onmouseenter = function(){ this.style.borderColor='var(--navy-light)'; this.style.boxShadow='var(--shadow-md)'; };
      btn.onmouseleave = function(){ this.style.borderColor='var(--border)'; this.style.boxShadow=''; };
      btn.innerHTML =
        '<div style="font-size:1.5rem;margin-bottom:8px;">' + m.icon + '</div>' +
        '<div style="font-size:.85rem;font-weight:600;color:var(--text);margin-bottom:2px;">' + m.name + '</div>' +
        '<div style="font-size:.7rem;color:var(--text-light);margin-bottom:10px;">' + topicCount + ' tema' + (topicCount!==1?'s':'') + ' · ' + noteCount + ' nota' + (noteCount!==1?'s':'') + '</div>' +
        '<div class="progress-track"><div class="progress-fill" style="width:' + prog + '%;height:4px;"></div></div>' +
        '<div style="font-size:.7rem;color:var(--navy);font-weight:600;margin-top:4px;">' + prog + '%</div>';
      btn.onclick = (function(id){ return function(){ openMateria(id); }; })(m.id);
      grid.appendChild(btn);
    });
    return;
  }

  // ── Topic list for selected materia ───────────────────────
  var m   = getMateria(nb.materiaId);
  var mid = nb.materiaId;
  var syl = SYLLABUS[mid] || [];

  // Build unit map
  var units = {};
  syl.forEach(function(unit) {
    if (!units[unit.unit]) units[unit.unit] = [];
    unit.topics.forEach(function(t) {
      var existing = data[mid].topics.find(function(u){ return u.text === t; });
      units[unit.unit].push({ text: t, done: existing ? existing.done : false });
    });
  });
  (data[mid].customUnits||[]).forEach(function(cu) {
    if (!units[cu.name]) units[cu.name] = [];
    cu.topics.forEach(function(t) {
      if (!units[cu.name].find(function(x){ return x.text === t; })) {
        var existing = data[mid].topics.find(function(u){ return u.text === t; });
        units[cu.name].push({ text: t, done: existing ? existing.done : false });
      }
    });
  });
  // Un-grouped user topics
  data[mid].topics.forEach(function(ut) {
    var inUnit = Object.keys(units).some(function(u){ return units[u].find(function(x){ return x.text === ut.text; }); });
    if (!inUnit) {
      var dest = ut.unit && units[ut.unit] ? ut.unit : 'Mis temas';
      if (!units[dest]) units[dest] = [];
      if (!units[dest].find(function(x){ return x.text === ut.text; }))
        units[dest].push({ text: ut.text, done: ut.done });
    }
  });

  var allUnitNames = Object.keys(units).filter(function(u){ return units[u].length > 0; });
  var totalT = allUnitNames.reduce(function(a,u){ return a+units[u].length; }, 0);
  var doneT  = allUnitNames.reduce(function(a,u){ return a+units[u].filter(function(t){ return t.done; }).length; }, 0);

  // Build header
  sec.innerHTML =
    '<div class="page-header" style="display:flex;align-items:flex-start;gap:10px;">' +
      '<button class="btn btn-ghost btn-sm btn-icon" id="nb-back-btn" style="flex-shrink:0;margin-top:4px;">←</button>' +
      '<div style="flex:1;min-width:0;">' +
        '<h2 class="page-title">' + m.icon + ' ' + m.name + '</h2>' +
        '<p class="page-sub">' + doneT + '/' + totalT + ' temas completados</p>' +
      '</div>' +
    '</div>' +
    '<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">' +
      '<button class="btn btn-primary btn-sm" id="nb-add-tema-btn">+ Tema / Subtema</button>' +
      '<button class="btn btn-ghost btn-sm" id="nb-add-unit-btn">+ Nueva unidad</button>' +
    '</div>' +
    '<div id="nb-units-container"></div>';

  document.getElementById('nb-back-btn').onclick = function(){ nb.materiaId=null; renderCuaderno(); };
  document.getElementById('nb-add-tema-btn').onclick = function(){ openAddTema(mid); };
  document.getElementById('nb-add-unit-btn').onclick = function(){ openAddUnit(mid); };

  var container = document.getElementById('nb-units-container');
  allUnitNames.forEach(function(unitName) {
    var topicList = units[unitName];
    var doneHere  = topicList.filter(function(t){ return t.done; }).length;

    var card = document.createElement('div');
    card.className = 'card';
    card.style.marginBottom = '10px';

    var details = document.createElement('details');
    details.open = true;

    var summary = document.createElement('summary');
    summary.style.cssText = 'display:flex;align-items:center;gap:8px;cursor:pointer;list-style:none;padding:2px 0;';
    summary.innerHTML =
      '<span style="flex:1;font-size:.82rem;font-weight:700;color:var(--text-mid);text-transform:uppercase;letter-spacing:.8px;">' + unitName + '</span>' +
      '<span style="font-size:.72rem;color:var(--navy);font-weight:600;">' + doneHere + '/' + topicList.length + '</span>' +
      '<span style="font-size:.75rem;color:var(--gray-400);margin-left:4px;">▾</span>';
    details.appendChild(summary);

    var topicContainer = document.createElement('div');
    topicContainer.style.cssText = 'display:flex;flex-direction:column;gap:5px;margin-top:10px;';

    topicList.forEach(function(t) {
      var key     = mid + '::' + t.text;
      var hasNote = notes[key] && ((notes[key].content||'')+(notes[key].cornellNotes||'')).trim().length > 5;

      var row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--r-md);border:1px solid var(--border);background:' + (t.done?'var(--sage-light)':'var(--surface)') + ';';

      // Checkbox
      var cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = !!t.done;
      cb.style.cssText = 'accent-color:var(--sage);width:15px;height:15px;flex-shrink:0;';
      cb.onchange = (function(topicText){ return function(){ toggleTopic(mid, topicText, this.checked); }; })(t.text);

      // Label
      var lbl = document.createElement('span');
      lbl.style.cssText = 'flex:1;font-size:.84rem;' + (t.done?'text-decoration:line-through;color:var(--text-light);':'');
      lbl.textContent = t.text;

      // Note badge
      var noteBadge = document.createElement('span');
      if (hasNote) {
        noteBadge.style.cssText = 'font-size:.68rem;background:var(--sage-light);color:var(--sage);padding:2px 6px;border-radius:99px;font-weight:600;';
        noteBadge.textContent = '✍️';
      }

      // Note button
      var noteBtn = document.createElement('button');
      noteBtn.style.cssText = 'padding:5px 11px;border-radius:var(--r-sm);background:var(--sky);color:var(--navy);font-size:.76rem;font-weight:600;border:1.5px solid var(--sky-deep);cursor:pointer;white-space:nowrap;';
      noteBtn.textContent = hasNote ? 'Ver nota' : '+ Nota';
      noteBtn.onclick = (function(topicText){ return function(){ openNota(mid, topicText); }; })(t.text);

      // Manage button (⋯)
      var manBtn = document.createElement('button');
      manBtn.style.cssText = 'width:26px;height:26px;border-radius:6px;background:var(--gray-100);border:none;cursor:pointer;font-size:.9rem;color:var(--text-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;';
      manBtn.title = 'Mover / eliminar';
      manBtn.textContent = '⋯';
      manBtn.onclick = (function(topicText){ return function(){ openReorganizeTema(mid, topicText); }; })(t.text);

      row.appendChild(cb);
      row.appendChild(lbl);
      if (hasNote) row.appendChild(noteBadge);
      row.appendChild(noteBtn);
      row.appendChild(manBtn);
      topicContainer.appendChild(row);
    });

    details.appendChild(topicContainer);
    card.appendChild(details);
    container.appendChild(card);
  });
}

function openMateria(mid) {
  nb.materiaId = mid;
  nb.topicKey  = null;
  renderCuaderno();
}


function toggleTopic(mid, text, done) {
  var idx = data[mid].topics.findIndex(function(t){ return t.text === text; });
  if (idx >= 0) {
    data[mid].topics[idx].done = done;
  } else {
    data[mid].topics.push({ text: text, done: done });
  }
  data[mid].progress = calcProgress(mid);
  saveAll();
  if (done) updateStreak();
  renderCuaderno();
}


function openAddTema(mid) {
  var box = document.getElementById('modal-tema-box');
  // Get existing custom units from data
  var customUnits = [];
  (data[mid].customUnits || []).forEach(function(u){ customUnits.push(u.name); });

  // Also get syllabus unit names
  var sylUnits = (SYLLABUS[mid]||[]).map(function(u){ return u.unit; });
  var allUnits = sylUnits.concat(customUnits.filter(function(u){ return !sylUnits.includes(u); }));

  box.innerHTML =
    '<div class="modal-title">+ Nuevo tema / subtema' +
      '<button class="modal-close" onclick="closeModal(\'modal-tema\')">✕</button>' +
    '</div>' +
    '<div class="field"><label class="field-label">Nombre del tema</label>' +
      '<input class="input" id="new-tema-input" placeholder="Ej: Hiperplasia prostática" autofocus>' +
    '</div>' +
    '<div class="field">' +
      '<label class="field-label">Unidad / Grupo</label>' +
      '<select class="select" id="new-tema-unit">' +
        '<option value="">Mis temas (sin agrupar)</option>' +
        '<option value="__new__">+ Crear nueva unidad...</option>' +
        allUnits.map(function(u){ return '<option value="' + u.replace(/"/g,'&quot;') + '">' + u + '</option>'; }).join('') +
      '</select>' +
    '</div>' +
    '<div class="field" id="new-unit-field" style="display:none;">' +
      '<label class="field-label">Nombre de la nueva unidad</label>' +
      '<input class="input" id="new-unit-input" placeholder="Ej: Trastornos del estado de ánimo">' +
    '</div>' +
    '<button class="btn btn-primary btn-full" onclick="confirmAddTema(\'' + mid + '\')">Agregar tema</button>';

  // Show new unit input when selected
  box.querySelector('#new-tema-unit').onchange = function() {
    document.getElementById('new-unit-field').style.display = this.value === '__new__' ? 'block' : 'none';
  };

  openModal('modal-tema');
  setTimeout(function(){ var el=document.getElementById('new-tema-input'); if(el) el.focus(); },100);
}


function confirmAddTema(mid) {
  var val  = (document.getElementById('new-tema-input').value||'').trim();
  var unit = document.getElementById('new-tema-unit').value;
  if (unit === '__new__') {
    unit = (document.getElementById('new-unit-input').value||'').trim();
    if (!unit) { toast('Escribe el nombre de la nueva unidad'); return; }
    // Save custom unit
    if (!data[mid].customUnits) data[mid].customUnits = [];
    if (!data[mid].customUnits.find(function(u){ return u.name === unit; })) {
      data[mid].customUnits.push({ name: unit, topics: [] });
    }
  }
  if (!val) { toast('Escribe el nombre del tema'); return; }
  if (data[mid].topics.find(function(t){ return t.text === val; })) {
    toast('Ese tema ya existe'); return;
  }
  data[mid].topics.push({ text: val, done: false, unit: unit || null });

  // If custom unit, also add to unit's topic list
  if (unit && data[mid].customUnits) {
    var cu = data[mid].customUnits.find(function(u){ return u.name === unit; });
    if (cu && !cu.topics.includes(val)) cu.topics.push(val);
  }
  saveAll();
  toast('✅ Tema agregado');
  closeModal('modal-tema');
  renderCuaderno();
}


function openAddUnit(mid) {
  var box = document.getElementById('modal-tema-box');
  box.innerHTML =
    '<div class="modal-title">+ Nueva unidad / grupo<button class="modal-close" onclick="closeModal(\'modal-tema\')">✕</button></div>' +
    '<div class="field"><label class="field-label">Nombre de la unidad</label>' +
      '<input class="input" id="new-unit-only-input" placeholder="Ej: Trastornos del estado de ánimo" autofocus>' +
    '</div>' +
    '<button class="btn btn-primary btn-full" onclick="confirmAddUnit(\'' + mid + '\')">Crear unidad</button>';
  openModal('modal-tema');
  setTimeout(function(){ var el=document.getElementById('new-unit-only-input'); if(el) el.focus(); },100);
}


function confirmAddUnit(mid) {
  var val = (document.getElementById('new-unit-only-input').value||'').trim();
  if (!val) { toast('Escribe el nombre de la unidad'); return; }
  if (!data[mid].customUnits) data[mid].customUnits = [];
  if (data[mid].customUnits.find(function(u){ return u.name === val; })) {
    toast('Esa unidad ya existe'); return;
  }
  data[mid].customUnits.push({ name: val, topics: [] });
  saveAll();
  toast('✅ Unidad creada');
  closeModal('modal-tema');
  renderCuaderno();
}



function openReorganizeTema(mid, topicText) {
  var box = document.getElementById('modal-tema-box');
  var sylUnits = (SYLLABUS[mid]||[]).map(function(u){ return u.unit; });
  var customUnits = (data[mid].customUnits||[]).map(function(u){ return u.name; });
  var allUnits = sylUnits.concat(customUnits.filter(function(u){ return !sylUnits.includes(u); }));

  box.innerHTML =
    '<div class="modal-title">Mover tema' +
      '<button class="modal-close" onclick="closeModal(\'modal-tema\')">✕</button>' +
    '</div>' +
    '<div style="background:var(--sky);border-radius:var(--r-md);padding:10px 14px;margin-bottom:14px;font-size:.87rem;font-weight:600;color:var(--navy);">' + topicText + '</div>' +
    '<div class="field"><label class="field-label">Mover a unidad</label>' +
      '<select class="select" id="move-unit-sel">' +
        '<option value="">Mis temas (sin agrupar)</option>' +
        '<option value="__new__">+ Crear nueva unidad...</option>' +
        allUnits.map(function(u){ return '<option value="' + u.replace(/"/g,'&quot;') + '">' + u + '</option>'; }).join('') +
      '</select>' +
    '</div>' +
    '<div class="field" id="move-new-unit-field" style="display:none;">' +
      '<label class="field-label">Nueva unidad</label>' +
      '<input class="input" id="move-new-unit-input" placeholder="Nombre de la unidad">' +
    '</div>' +
    '<div style="display:flex;gap:8px;">' +
      '<button class="btn btn-primary btn-full" onclick="confirmMoveTema(\'' + mid + '\',\'' + topicText.replace(/'/g,"\\'") + '\')">Mover</button>' +
      '<button class="btn btn-ghost btn-sm" style="color:#c62828;flex-shrink:0;" onclick="deleteTema(\'' + mid + '\',\'' + topicText.replace(/'/g,"\\'") + '\')">🗑 Eliminar</button>' +
    '</div>';

  box.querySelector('#move-unit-sel').onchange = function() {
    document.getElementById('move-new-unit-field').style.display = this.value === '__new__' ? 'block' : 'none';
  };
  openModal('modal-tema');
}


function confirmMoveTema(mid, topicText) {
  var unit = document.getElementById('move-unit-sel').value;
  if (unit === '__new__') {
    unit = (document.getElementById('move-new-unit-input').value||'').trim();
    if (!unit) { toast('Escribe el nombre de la unidad'); return; }
    if (!data[mid].customUnits) data[mid].customUnits = [];
    if (!data[mid].customUnits.find(function(u){ return u.name === unit; })) {
      data[mid].customUnits.push({ name: unit, topics: [] });
    }
  }
  // Update topic's unit
  var t = data[mid].topics.find(function(x){ return x.text === topicText; });
  if (t) t.unit = unit || null;
  // Add to custom unit topic list if applicable
  if (unit && data[mid].customUnits) {
    // Remove from old units
    data[mid].customUnits.forEach(function(cu){ cu.topics = cu.topics.filter(function(tt){ return tt !== topicText; }); });
    var cu = data[mid].customUnits.find(function(u){ return u.name === unit; });
    if (cu && !cu.topics.includes(topicText)) cu.topics.push(topicText);
  }
  saveAll();
  toast('✅ Tema movido');
  closeModal('modal-tema');
  renderCuaderno();
}


function deleteTema(mid, topicText) {
  if (!confirm('¿Eliminar el tema "' + topicText + '"?')) return;
  data[mid].topics = data[mid].topics.filter(function(t){ return t.text !== topicText; });
  // Also remove from custom units
  if (data[mid].customUnits) {
    data[mid].customUnits.forEach(function(cu){ cu.topics = cu.topics.filter(function(tt){ return tt !== topicText; }); });
  }
  var key = mid + '::' + topicText;
  delete notes[key];
  saveAll();
  toast('🗑 Tema eliminado');
  closeModal('modal-tema');
  renderCuaderno();
}

// NOTE OVERLAY — full screen editor with topic sidebar
// ══════════════════════════════════════════════════════════════
var noteOv = {
  mid: null, key: null, pageStyle: 'blank', autoSaveTimer: null,
};
var TAG_META = {
  resumen:    { label:'Resumen',       bg:'#E3F2FD', color:'#1565C0' },
  tip:        { label:'Tip',           bg:'#E8F5E9', color:'#2E7D32' },

};


function openNota(mid, topicText) {
  noteOv.mid = mid;
  noteOv.key = mid + '::' + topicText;
  if (!notes[noteOv.key]) notes[noteOv.key] = { title: topicText, content: '', tags: [], pageStyle: 'blank', updatedAt: null };

  ov.style.display = 'flex';
  document.body.style.overflow = 'hidden';

function closeNoteOverlay() {
  saveNoteOverlay(false);
  document.getElementById('note-overlay').style.display = 'none';
  document.body.style.overflow = '';

}


function renderNoteOverlay() {
  var m    = getMateria(noteOv.mid);
  var note = notes[noteOv.key] || {};
  var el;
  el = document.getElementById('note-ov-materia-label'); if (el) el.textContent = m ? m.icon + ' ' + m.name : '';
  el = document.getElementById('note-ov-topic-label');   if (el) el.textContent = note.title || '';
  renderNoteTopicList();
  renderNoteTags();
  buildNoteToolbar();
  noteOv.pageStyle = note.pageStyle || 'blank';
  applyNotePageStyle(noteOv.pageStyle);
  var ed = document.getElementById('note-ov-editor');
  if (ed && noteOv.pageStyle !== 'cornell') ed.innerHTML = note.content || '';
  if (noteOv.pageStyle === 'cornell') {
    var ci = document.getElementById('cornell-ideas');
    var cn = document.getElementById('cornell-notes-area');
    var cs = document.getElementById('cornell-summary');
    var ch = document.getElementById('cornell-heading');
    if (ci) ci.value = note.cornellIdeas   || '';
    if (cn) cn.value = note.cornellNotes   || '';
    if (cs) cs.value = note.cornellSummary || '';
    if (ch) ch.value = note.cornellHeading || note.title || '';
  }
  document.querySelectorAll('.note-style-btn').forEach(function(b){ b.classList.remove('active'); });
  var ab = document.querySelector('.note-style-btn[onclick*="' + noteOv.pageStyle + '"]');
  if (ab) ab.classList.add('active');
}


function renderNoteTopicList() {
  var mid    = noteOv.mid;
  var syl    = SYLLABUS[mid] || [];
  var search = ((document.getElementById('note-ov-search')||{}).value||'').toLowerCase();
  var units  = {};
  syl.forEach(function(unit) {
    unit.topics.forEach(function(t) {
      if (!search || t.toLowerCase().includes(search)) {
        if (!units[unit.unit]) units[unit.unit] = [];
        units[unit.unit].push(t);
      }
    });
  });
  (data[mid].customUnits||[]).forEach(function(cu) {
    cu.topics.forEach(function(t) {
      if (!units[cu.name]) units[cu.name] = [];
      if (!units[cu.name].includes(t) && (!search || t.toLowerCase().includes(search))) units[cu.name].push(t);
    });
  });
  var ungrouped = (data[mid].topics||[]).filter(function(ut) {
    var inUnit = false;
    Object.keys(units).forEach(function(u){ if (units[u].includes(ut.text)) inUnit = true; });
    return !inUnit && (!search || ut.text.toLowerCase().includes(search));
  });
  if (ungrouped.length) {
    units['Mis temas'] = ungrouped.map(function(u){ return u.text; });
  }
  var container = document.getElementById('note-ov-topic-list');
  if (!container) return;
  container.innerHTML = '';
  Object.keys(units).forEach(function(unitName) {
    var sec = document.createElement('div');
    sec.className = 'note-sidebar-section';
    sec.textContent = unitName;
    container.appendChild(sec);
    units[unitName].forEach(function(topicText) {
      var key     = mid + '::' + topicText;
      var hasNote = notes[key] && ((notes[key].content||'') + (notes[key].cornellNotes||'')).trim().length > 5;
      var isActive = key === noteOv.key;
      var btn = document.createElement('button');
      btn.className = 'note-topic-btn' + (isActive ? ' active' : '');
      btn.innerHTML = '<span class="note-dot" style="background:' + (hasNote?'var(--sage)':'var(--gray-300)') + ';"></span>' +
                      '<span style="flex:1;line-height:1.3;">' + topicText + '</span>';
      btn.onclick = function() { switchNoteOv(mid, topicText); };
      container.appendChild(btn);
    });
  });
}


function switchNoteOv(mid, topicText) {
  saveNoteOverlay(true);
  noteOv.mid = mid;
  noteOv.key = mid + '::' + topicText;
  if (!notes[noteOv.key]) notes[noteOv.key] = { title: topicText, content: '', tags: [], pageStyle: 'blank', updatedAt: null };
  renderNoteOverlay();
}


function filterNoteTopics() { renderNoteTopicList(); }


function renderNoteTags() {
  var note = notes[noteOv.key] || {};
  var c = document.getElementById('note-ov-tags');
  if (!c) return;
  c.innerHTML = '';
  Object.keys(TAG_META).forEach(function(tg) {
    var tm  = TAG_META[tg];
    var sel = note.tags && note.tags.includes(tg);
    var btn = document.createElement('button');
    btn.className = 'note-tag-pill';
    btn.textContent = tm.label;
    btn.style.cssText = 'background:' + (sel?tm.color:tm.bg) + ';color:' + (sel?'white':tm.color) + ';border-color:' + tm.color + ';';
    btn.onclick = function() {
      if (!notes[noteOv.key].tags) notes[noteOv.key].tags = [];
      var idx = notes[noteOv.key].tags.indexOf(tg);
      if (idx >= 0) notes[noteOv.key].tags.splice(idx,1); else notes[noteOv.key].tags.push(tg);
      renderNoteTags();
    };
    c.appendChild(btn);
  });
}


function buildNoteToolbar() {
  var tb = document.getElementById('note-ov-toolbar');
  if (!tb) return;
  var buttons = [
    {cmd:'bold',html:'<b>N</b>'},{cmd:'italic',html:'<i>K</i>'},{cmd:'underline',html:'<u>S</u>'},{cmd:'strikeThrough',html:'<s>T</s>'},
    '|',
    {cmd:'insertUnorderedList',html:'☰'},{cmd:'insertOrderedList',html:'1.'},
    '|',
    {cmd:'formatBlock-h2',html:'H2'},{cmd:'formatBlock-h3',html:'H3'},{cmd:'formatBlock-blockquote',html:'❝'},
    '|',
    {color:'#C2185B',title:'Rosa'},{color:'#2E7D32',title:'Verde'},{color:'#1565C0',title:'Azul'},{color:'#E65100',title:'Naranja'},
    '|',
    {cmd:'removeFormat',html:'✕'},
  ];
  tb.innerHTML = '';
  buttons.forEach(function(b) {
    if (b === '|') {
      var s = document.createElement('span');
      s.style.cssText = 'width:1px;height:18px;background:var(--gray-300);margin:0 3px;align-self:center;display:inline-block;';
      tb.appendChild(s); return;
    }
    if (b.color) {
      var sw = document.createElement('button');
      sw.style.cssText = 'width:18px;height:18px;border-radius:50%;background:' + b.color + ';border:2px solid transparent;cursor:pointer;flex-shrink:0;';
      sw.onmouseenter = function(){ this.style.transform='scale(1.2)'; };
      sw.onmouseleave = function(){ this.style.transform=''; };
      sw.onclick = function(e){ e.preventDefault(); var ed=document.getElementById('note-ov-editor'); if(ed)ed.focus(); document.execCommand('foreColor',false,b.color); };
      tb.appendChild(sw); return;
    }
    var btn = document.createElement('button');
    btn.innerHTML = b.html; btn.title = b.html;
    btn.style.cssText = 'padding:4px 8px;border-radius:6px;border:none;font-size:.78rem;background:transparent;cursor:pointer;';
    btn.onmouseenter = function(){ this.style.background='var(--sky)'; };
    btn.onmouseleave = function(){ this.style.background='transparent'; };
    var parts = (b.cmd||'').split('-');
    var ac = parts[0], arg = parts[1]||null;
    btn.onclick = function(e){ e.preventDefault(); var ed=document.getElementById('note-ov-editor'); if(ed)ed.focus(); document.execCommand(ac,false,arg); };
    tb.appendChild(btn);
  });
}


function setNotePageStyle(style, btn) {
  saveNoteOverlay(true);
  noteOv.pageStyle = style;
  if (notes[noteOv.key]) notes[noteOv.key].pageStyle = style;
  applyNotePageStyle(style);
  document.querySelectorAll('.note-style-btn').forEach(function(b){ b.classList.remove('active'); });
  if (btn) btn.classList.add('active');
}


function applyNotePageStyle(style) {
  var ed = document.getElementById('note-ov-editor');
  var cornell = document.getElementById('cornell-layout');
  if (!ed || !cornell) return;
  ed.classList.remove('lined','grid');
  if (style === 'cornell') {
    ed.style.display = 'none'; cornell.style.display = 'block';
    var note = notes[noteOv.key] || {};
    var ci = document.getElementById('cornell-ideas');
    var cn = document.getElementById('cornell-notes-area');
    var cs = document.getElementById('cornell-summary');
    var ch = document.getElementById('cornell-heading');
    if (ci && !ci.value) ci.value = note.cornellIdeas   || '';
    if (cn && !cn.value) cn.value = note.cornellNotes   || '';
    if (cs && !cs.value) cs.value = note.cornellSummary || '';
    if (ch && !ch.value) ch.value = note.cornellHeading || (note.title||'');
  } else {
    ed.style.display = 'block'; cornell.style.display = 'none';
    if (style === 'lined') ed.classList.add('lined');
    else if (style === 'grid') ed.classList.add('grid');
  }
}


function scheduleNoteAutoSave() {
  clearTimeout(noteOv.autoSaveTimer);
  noteOv.autoSaveTimer = setTimeout(function(){ saveNoteOverlay(true); }, 1500);
}


function saveNoteOverlay(silent) {
  if (!noteOv.key || !notes[noteOv.key]) return;
  if (noteOv.pageStyle === 'cornell') {
    notes[noteOv.key].cornellIdeas   = (document.getElementById('cornell-ideas')      ||{value:''}).value;
    notes[noteOv.key].cornellNotes   = (document.getElementById('cornell-notes-area') ||{value:''}).value;
    notes[noteOv.key].cornellSummary = (document.getElementById('cornell-summary')    ||{value:''}).value;
    notes[noteOv.key].cornellHeading = (document.getElementById('cornell-heading')    ||{value:''}).value;
    notes[noteOv.key].content = '';
  } else {
    var ed = document.getElementById('note-ov-editor');
    notes[noteOv.key].content = ed ? ed.innerHTML : '';
  }
  notes[noteOv.key].pageStyle  = noteOv.pageStyle;
  notes[noteOv.key].updatedAt  = new Date().toISOString();
  saveAll();
  var badge = document.getElementById('note-ov-saved');
  if (badge) { badge.style.opacity='1'; setTimeout(function(){ badge.style.opacity='0'; },1400); }
  if (!silent) toast('✅ Guardado');
}

function renderPlanificador() {
  var sec   = document.getElementById('section-planificador');
  var today = todayISO();

  // Build calendar for current month showing study events
  var allPlanDays = {}; // date → [ {label, type, planId, materiaId} ]
  examPlans.forEach(function(plan) {
    (plan.plan||[]).forEach(function(day) {
      if (!allPlanDays[day.date]) allPlanDays[day.date] = [];
      allPlanDays[day.date].push({ label: day.label, type: day.type, topic: day.topic, planId: plan.id, materiaId: plan.materiaId });
    });
  });

  // Calendar month
  var calDate = new Date();
  if (window._planCalYear)  calDate.setFullYear(window._planCalYear);
  if (window._planCalMonth !== undefined) calDate.setMonth(window._planCalMonth);
  var year  = calDate.getFullYear();
  var month = calDate.getMonth();
  window._planCalYear  = year;
  window._planCalMonth = month;

  var firstDay  = new Date(year, month, 1).getDay();
  var daysInMon = new Date(year, month+1, 0).getDate();
  var monthLabel = calDate.toLocaleDateString('es-ES', { month:'long', year:'numeric' });

  // Build calendar grid HTML
  var dayNames = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  var calCells = '';
  // Day headers
  calCells += dayNames.map(function(d){ return '<div style="font-size:.65rem;font-weight:700;text-align:center;color:var(--text-light);padding:4px 0;text-transform:uppercase;">' + d + '</div>'; }).join('');
  // Empty cells before first day
  for (var i=0; i<firstDay; i++) calCells += '<div></div>';
  // Day cells
  for (var d=1; d<=daysInMon; d++) {
    var iso  = year + '-' + String(month+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    var events = allPlanDays[iso] || [];
    var isToday = iso === today;
    var hasStudy  = events.some(function(e){ return e.type !== 'repaso'; });
    var hasRepaso = events.some(function(e){ return e.type === 'repaso'; });
    var dotColor  = hasStudy ? 'var(--navy)' : hasRepaso ? 'var(--salmon)' : '';
    calCells += '<div onclick="showPlanDayDetail(\'' + iso + '\')" style="' +
      'aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;' +
      'cursor:' + (events.length?'pointer':'default') + ';' +
      'background:' + (isToday?'var(--navy)':events.length?'var(--sky)':'transparent') + ';' +
      'border:1.5px solid ' + (isToday?'var(--navy)':events.length?'var(--sky-deep)':'transparent') + ';' +
      'font-size:.8rem;font-weight:' + (isToday?'700':'400') + ';' +
      'color:' + (isToday?'white':'var(--text)') + ';' +
      'transition:all .15s;position:relative;" ' +
      (events.length?'onmouseover="this.style.background=\'' + (isToday?'var(--navy-mid)':'var(--sky-deep)') + '\'" onmouseout="this.style.background=\'' + (isToday?'var(--navy)':'var(--sky)') + '\'"':'') + '>' +
      d +
      (dotColor ? '<span style="position:absolute;bottom:3px;width:5px;height:5px;border-radius:50%;background:' + dotColor + ';"></span>' : '') +
    '</div>';
  }

  var plansHtml = examPlans.length === 0
    ? '<div class="empty"><div class="empty-icon">📅</div><h3>Sin planes de estudio</h3><p>Crea tu primer plan para una materia</p></div>'
    : '<div style="display:flex;flex-direction:column;gap:8px;">' +
        examPlans.map(function(plan) {
          var days = daysUntil(plan.examDate);
          var done = (plan.plan||[]).filter(function(d){ return d.date < today; }).length;
          var total = (plan.plan||[]).length;
          var pct = total > 0 ? Math.round(done/total*100) : 0;
          var m = getMateria(plan.materiaId);
          return '<div class="card" style="padding:14px;">' +
            '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px;">' +
              '<div>' +
                '<div style="font-weight:700;font-size:.9rem;">' + (m?m.icon+' ':'') + plan.materia + '</div>' +
                '<div class="t-small">Examen: ' + fmtDate(plan.examDate) + ' · ' + Math.max(0,days) + ' días</div>' +
              '</div>' +
              '<div style="display:flex;gap:5px;">' +
                '<button class="btn btn-ghost btn-sm" onclick="viewPlan(\'' + plan.id + '\')">Ver plan</button>' +
                '<button class="btn btn-ghost btn-sm" style="color:#c62828;padding:7px 9px;" onclick="deletePlan(\'' + plan.id + '\')">✕</button>' +
              '</div>' +
            '</div>' +
            '<div style="display:flex;justify-content:space-between;font-size:.72rem;color:var(--text-mid);margin-bottom:4px;">' +
              '<span>' + done + '/' + total + ' días</span><span>' + pct + '%</span>' +
            '</div>' +
            '<div class="progress-track"><div class="progress-fill" style="width:' + pct + '%;"></div></div>' +
          '</div>';
        }).join('') +
      '</div>';

  sec.innerHTML =
    '<div class="page-header">' +
      '<h2 class="page-title">📅 Planificador</h2>' +
      '<p class="page-sub">Calendario de estudio inteligente</p>' +
    '</div>' +

    // Action buttons
    '<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">' +
      '<button class="btn btn-primary btn-sm" onclick="openCrearPlan()">+ Crear plan de examen</button>' +
      '<button class="btn btn-secondary btn-sm" onclick="openEstudioAleatorio()">🎲 Estudio aleatorio</button>' +
    '</div>' +

    // Calendar
    '<div class="card" style="margin-bottom:14px;">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">' +
        '<button class="btn btn-ghost btn-sm btn-icon" onclick="planCalNav(-1)">‹</button>' +

function generarAleatorio() {
  var dias    = parseInt(document.getElementById('rand-dias').value) || 7;
  var perDia  = parseInt(document.getElementById('rand-perdia').value) || 2;
  var mids    = Array.from(document.querySelectorAll('.rand-materia-cb:checked')).map(function(el){ return el.value; });
  if (!mids.length) { toast('Selecciona al menos una materia'); return; }

  // Collect all syllabus topics from selected materias
  var pool = [];
  mids.forEach(function(mid) {
    var syl = SYLLABUS[mid] || [];
    syl.forEach(function(unit) {
      unit.topics.forEach(function(t){ pool.push({ mid: mid, topic: t }); });
    });
  });
  // Shuffle
  for (var i=pool.length-1; i>0; i--) {
    var j = Math.floor(Math.random()*(i+1));
    var tmp = pool[i]; pool[i] = pool[j]; pool[j] = tmp;
  }

  var today = todayISO();
  var plan  = [];
  var used  = 0;
  for (var d=0; d<dias; d++) {
    for (var p=0; p<perDia && used<pool.length; p++) {
      var item = pool[used++];
      var m    = getMateria(item.mid);
      plan.push({ date: addDays(today,d), label: (m?m.name+' — ':'')+item.topic, type:'estudio', topic:item.topic, materiaId:item.mid });
    }
  }

  var newPlan = {
    id: Date.now().toString(),
    materia: 'Repaso aleatorio 🎲',
    materiaId: mids[0],
    examDate: addDays(today, dias),
    topics: pool.slice(0,dias*perDia).map(function(x){ return x.topic; }),
    hoursPerDay: 2,
    plan: plan,
    createdAt: new Date().toISOString(),
  };
  examPlans.push(newPlan);
  saveAll();
  closeModal('modal-examen');
  toast('🎲 Horario aleatorio generado — ' + plan.length + ' sesiones');
  renderPlanificador();
}

// ── Viability calculator ──────────────────────────────────────────────────
function calcPlanViability() {
  var fechaEl = document.getElementById('plan-fecha');
  var horasEl = document.getElementById('plan-horas');
  var temasEl = document.getElementById('plan-temas-list');
  var panel   = document.getElementById('plan-viability');
  if (!fechaEl || !horasEl || !panel) return;

  var fecha = fechaEl.value;
  var horas = parseFloat(horasEl.value) || 0;
  if (!fecha || horas <= 0) { panel.style.display = 'none'; return; }

  var dias   = daysUntil(fecha);
  var temas  = temasEl ? temasEl.querySelectorAll('[data-t]').length : 0;
  if (dias <= 0 || temas === 0) { panel.style.display = 'none'; return; }

  // ── Calculation model ─────────────────────────────────────────────
  // Each topic: 45 min initial study
  // Spaced repetition overhead: +40% (review sessions at day 1, 3, 7)
  var MIN_PER_TOPIC   = 45;
  var SR_OVERHEAD     = 0.40;
  var minNeeded       = Math.ceil(temas * MIN_PER_TOPIC * (1 + SR_OVERHEAD));
  var minAvailable    = dias * horas * 60;
  var pct             = Math.min(Math.round(minAvailable / minNeeded * 100), 100);
  var deficit         = minNeeded - minAvailable;          // minutes short
  var maxTopics       = Math.max(0, Math.floor(minAvailable / (MIN_PER_TOPIC * (1 + SR_OVERHEAD))));
  var suggestedHours  = Math.ceil((minNeeded / dias) / 60 * 4) / 4;  // round to 0.25h
  var extraDays       = Math.ceil(deficit / (horas * 60));

  // ── Build panel HTML ──────────────────────────────────────────────
  var bg, border, icon, title, bodyHtml, suggestHtml;

  if (pct >= 100) {
    // ✅ Fully viable
    bg = 'linear-gradient(135deg,#E8F8F0,#D1F2E4)';
    border = '#27AE60';
    icon = '✅';
    title = 'Plan viable — tiempo suficiente';
    bodyHtml =
      '<div style="font-size:.81rem;color:#145A32;line-height:1.6;">' +
        'Tienes <b>' + Math.round(minAvailable/60) + ' horas disponibles</b> para cubrir los ' +
        '<b>' + temas + ' temas</b> con repetición espaciada incluida ' +
        '(<b>' + Math.round(minNeeded/60) + 'h estimadas</b>). Bien planificado.' +
      '</div>' +
      '<div style="margin-top:8px;">' +
        '<div style="background:rgba(255,255,255,.5);border-radius:6px;height:8px;overflow:hidden;">' +
          '<div style="width:' + pct + '%;height:100%;background:#27AE60;border-radius:6px;transition:width .4s;"></div>' +
        '</div>' +
        '<div style="font-size:.71rem;color:#145A32;margin-top:3px;text-align:right;">' + pct + '% de cobertura</div>' +
      '</div>';
    suggestHtml = '';
  } else if (pct >= 70) {
    // ⚠️ Tight but workable
    bg = 'linear-gradient(135deg,#FFFBEB,#FEF3C7)';
    border = '#F59E0B';
    icon = '⚠️';
    title = 'Plan ajustado — poco margen';
    bodyHtml =
      '<div style="font-size:.81rem;color:#78350F;line-height:1.6;">' +
        'El tiempo es justo. Alcanzas el <b>' + pct + '%</b> del temario con repasos. ' +
        'Sin los repasos cubrirías el 100%, pero la retención sería mucho menor.' +
      '</div>' +
      '<div style="margin-top:8px;">' +
        '<div style="background:rgba(255,255,255,.5);border-radius:6px;height:8px;overflow:hidden;">' +
          '<div style="width:' + pct + '%;height:100%;background:#F59E0B;border-radius:6px;"></div>' +
        '</div>' +
        '<div style="font-size:.71rem;color:#78350F;margin-top:3px;text-align:right;">' + pct + '% de cobertura</div>' +
      '</div>';
    suggestHtml =
      '<div style="margin-top:10px;">' +
        '<div style="font-size:.74rem;font-weight:700;color:#78350F;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;">Opciones para mejorar:</div>' +
        '<div style="display:flex;flex-direction:column;gap:5px;">' +
          '<button onclick="document.getElementById(\'plan-horas\').value=' + suggestedHours + ';calcPlanViability();" ' +
            'style="background:#FEF3C7;border:1.5px solid #F59E0B;border-radius:7px;padding:7px 10px;font-size:.78rem;cursor:pointer;text-align:left;">' +
            '⏰ Aumentar a <b>' + suggestedHours + 'h/día</b> para cubrir el 100%' +
          '</button>' +
          '<div style="background:rgba(255,255,255,.5);border:1px solid #F59E0B;border-radius:7px;padding:7px 10px;font-size:.78rem;">' +
            '📅 Agregar <b>' + Math.max(1,extraDays) + ' días más</b> daría margen cómodo' +
          '</div>' +
        '</div>' +
      '</div>';
  } else {
    // ❌ Infeasible
    bg = 'linear-gradient(135deg,#FEF2F2,#FECACA)';
    border = '#EF4444';
    icon = '🚨';
    title = 'Tiempo insuficiente';
    bodyHtml =
      '<div style="font-size:.81rem;color:#7F1D1D;line-height:1.6;">' +
        'Con <b>' + horas + 'h/día</b> en <b>' + dias + ' día' + (dias===1?'':'s') + '</b> ' +
        'tienes <b>' + Math.round(minAvailable/60) + 'h disponibles</b>, pero necesitas ' +
        '<b>' + Math.round(minNeeded/60) + 'h</b> para los ' + temas + ' temas con repasos espaciados. ' +
        'Faltan <b>' + Math.round(deficit/60*10)/10 + 'h</b>.' +
      '</div>' +
      '<div style="margin-top:8px;">' +
        '<div style="background:rgba(255,255,255,.5);border-radius:6px;height:8px;overflow:hidden;">' +
          '<div style="width:' + pct + '%;height:100%;background:#EF4444;border-radius:6px;"></div>' +
        '</div>' +
        '<div style="font-size:.71rem;color:#7F1D1D;margin-top:3px;text-align:right;">' + pct + '% de cobertura</div>' +
      '</div>';
    suggestHtml =
      '<div style="margin-top:10px;">' +
        '<div style="font-size:.74rem;font-weight:700;color:#7F1D1D;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;">Para alcanzar el objetivo:</div>' +
        '<div style="display:flex;flex-direction:column;gap:5px;">' +
          '<button onclick="document.getElementById(\'plan-horas\').value=' + suggestedHours + ';calcPlanViability();" ' +
            'style="background:#FEF2F2;border:1.5px solid #EF4444;border-radius:7px;padding:7px 10px;font-size:.78rem;cursor:pointer;text-align:left;">' +
            '⏰ Estudiar <b>' + suggestedHours + 'h/día</b> — cubre todos los temas con repasos' +
          '</button>' +
          '<div style="background:rgba(255,255,255,.5);border:1px solid #EF4444;border-radius:7px;padding:7px 10px;font-size:.78rem;color:#7F1D1D;">' +
            '📚 Reducir a <b>' + maxTopics + ' temas</b> con las ' + horas + 'h/día actuales' +
          '</div>' +
          '<div style="background:rgba(255,255,255,.5);border:1px solid #EF4444;border-radius:7px;padding:7px 10px;font-size:.78rem;color:#7F1D1D;">' +
            '📅 Necesitas <b>' + extraDays + ' días adicionales</b> al ritmo actual' +
          '</div>' +
        '</div>' +
        '<div style="margin-top:8px;font-size:.74rem;color:#991B1B;background:rgba(255,255,255,.4);border-radius:6px;padding:6px 8px;">' +
          '⚠️ Estudiar de última hora sin repasos reduce la retención hasta un <b>50%</b> en las primeras 24h.' +
        '</div>' +
      '</div>';
  }

  panel.style.cssText = 'display:block;background:' + bg + ';border-left:4px solid ' + border +
    ';border-radius:var(--r-md);padding:12px 14px;margin-bottom:14px;';
  panel.innerHTML =
    '<div style="display:flex;align-items:center;gap:7px;margin-bottom:7px;">' +
      '<span style="font-size:1.1rem;">' + icon + '</span>' +
      '<span style="font-weight:700;font-size:.86rem;color:#1a1a2e;">' + title + '</span>' +
    '</div>' +
    bodyHtml + suggestHtml;
}

function generarPlan() {
  var mid   = document.getElementById('plan-materia').value;
  var fecha = document.getElementById('plan-fecha').value;
  var horas = parseFloat(document.getElementById('plan-horas').value) || 2;
  var temas = Array.from(document.querySelectorAll('#plan-temas-list [data-t]')).map(function(el){ return el.dataset.t; });

  if (!mid)   { toast('Selecciona una materia'); return; }
  if (!fecha) { toast('Selecciona la fecha del examen'); return; }
  if (!temas.length) { toast('Agrega al menos un tema'); return; }

  var dias = daysUntil(fecha);
  var MIN_PER_TOPIC = 45;
  var REPASO_OVERHEAD = 0.40;
  var minutesAvailable = dias * horas * 60;
  var minutesNeeded = Math.ceil(temas.length * MIN_PER_TOPIC * (1 + REPASO_OVERHEAD));
  var feasible = minutesAvailable >= minutesNeeded;

  if (!feasible) {
    var maxTopics = Math.floor(minutesAvailable / (MIN_PER_TOPIC * (1 + REPASO_OVERHEAD)));
    var suggestedHours = Math.ceil((minutesNeeded / dias) / 60 * 2) / 2;
    var proceed = confirm(
      'Atención: tiempo insuficiente\n\n' +
      'Con ' + horas + 'h/día en ' + dias + ' días NO alcanzas a cubrir los ' + temas.length + ' temas con repasos.\n\n' +
      'Sugerencias:\n' +
      '• Reducir a ' + maxTopics + ' temas más importantes\n' +
      '• Aumentar a ' + suggestedHours + 'h/día\n\n' +
      '¿Generar el plan de todas formas con los temas actuales?'
    );
    if (!proceed) return;
  }

  var m = getMateria(mid);
  var plan = buildStudyPlan(temas, fecha, horas);

  // Topics covered by the plan vs all requested
  var covered = plan.filter(function(d){ return d.type==='estudio' && d.topic; })
                    .map(function(d){ return d.topic; });
  var pending = temas.filter(function(t){ return covered.indexOf(t) === -1; });

  examPlans.push({
    id:            Date.now().toString(),
    materia:       m ? m.name : mid,
    materiaId:     mid,
    examDate:      fecha,
    topics:        temas,
    hoursPerDay:   horas,
    plan:          plan,
    pendingTopics: pending,
    createdAt:     new Date().toISOString(),
  });
  saveAll();
  closeModal('modal-examen');
  toast('✅ Plan generado — ' + plan.length + ' sesiones · ' + (feasible ? 'Plan viable' : 'Revisar tiempos'));
  renderPlanificador();
}


function loadSyllabusToPlan() {
  var mid = document.getElementById('plan-materia').value;
  if (!mid) return;
  var syl  = SYLLABUS[mid] || [];
  var list = document.getElementById('plan-temas-list');

  // ── Clear list before loading new materia's syllabus ──────────────
  list.innerHTML = '';

  // Add user custom topics for this materia too
  var customTopics = (data[mid] && data[mid].topics || []).map(function(t){ return t.text; });

  // Collect all syllabus topics
  syl.forEach(function(unit) {
    unit.topics.forEach(function(t) { addTemaItem(t); });
  });

  // Add any custom user topics not already in syllabus
  var sylTopics = syl.reduce(function(a, u){ return a.concat(u.topics); }, []);
  customTopics.forEach(function(t) {
    if (sylTopics.indexOf(t) === -1) addTemaItem(t);
  });

  calcPlanViability();
}
